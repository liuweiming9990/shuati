<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>刷题吧</title>
    <!-- 图标配置（回滚到最初可靠的版本） -->
    <link rel="icon" type="image/png" href="tubiao.PNG">
    <link rel="apple-touch-icon" sizes="180x180" href="tubiao.PNG">
    <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%E5%88%B7%E9%A2%98%E5%90%A7%22%2C%22short_name%22%3A%22%E5%88%B7%E9%A2%98%E5%90%A7%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%7D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3B82F6">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root{--bg:#f3f4f6;--card:#fff;--primary:#3B82F6;--accent:#e94560;--text:#1f2937;--text2:#6b7280;--border:#e5e7eb;--input-bg:#f9fafb;--r:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:1rem}
        .nav{background:var(--card);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .nav-title{font-size:18px;font-weight:700;color:var(--primary)}
        .nav-right{display:flex;gap:6px;align-items:center}
        .nav-btn{background:var(--input-bg);color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:500}
        .nav-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
        .main{padding:12px;max-width:600px;margin:0 auto}
        .card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.05)}
        .card-title{font-size:14px;color:var(--text2);margin-bottom:8px;font-weight:500;word-break:break-word}
        .question-text{font-size:16px;line-height:1.6;margin-bottom:16px;font-weight:500;word-break:break-word}
        .option-item{display:flex;align-items:center;padding:12px;margin-bottom:8px;background:var(--input-bg);border-radius:var(--r);cursor:pointer;border:1.5px solid var(--border);font-size:15px;transition:.2s}
        .option-item.selected{border-color:var(--primary);background:rgba(59,130,246,.05)}
        .option-item.correct-highlight{border-color:#10B981;background:rgba(16,185,129,.08)}
        .option-item .letter{width:28px;height:28px;border-radius:50%;background:rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center;margin-right:10px;font-weight:700;font-size:13px;flex-shrink:0;color:var(--primary)}
        .option-item.selected .letter{background:var(--primary);color:#fff}
        .option-item.correct-highlight .letter{background:#10B981;color:#fff}
        .btn{padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer}
        .btn-submit{background:var(--primary);color:#fff}
        .btn-nav{background:var(--input-bg);color:var(--text);border:1px solid var(--border)}
        .btn-row{display:flex;gap:8px;margin-top:12px}
        .analysis{padding:12px;border-radius:var(--r);margin-top:12px;font-size:14px;line-height:1.5}
        .analysis.correct{background:#f0fdf4;color:#166534}
        .analysis.wrong{background:#fee2e2;color:#b91c1c}
        .analysis.info{background:#f0fdf4;color:#166534}
        .progress-text{font-size:12px;color:var(--text2);text-align:center;margin-bottom:4px}
        .progress-bar{height:4px;background:var(--border);border-radius:2px;margin:12px 0;overflow:hidden}
        .progress-fill{height:100%;background:var(--primary);transition:width .3s}
        .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .mode-btn{padding:12px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;cursor:pointer;text-align:center}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
        .modal-overlay.show{display:flex}
        .modal-box{background:#fff;border-radius:var(--r);padding:20px;width:92%;max-width:600px;max-height:85vh;overflow-y:auto}
        .modal-box h3{margin-bottom:12px;color:var(--primary);text-align:center}
        .footer{text-align:center;padding:20px 12px;color:var(--text2);font-size:13px;border-top:1px solid var(--border);margin-top:24px}
        .import-help{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#166534;line-height:1.6}
        .import-help strong{color:#15803d}
        .format-hint{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:12px;color:#475569;line-height:1.6}
        .format-hint strong{color:#1e293b}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
        .toast.show{opacity:1}
        .back-btn{display:inline-flex;align-items:center;gap:4px;background:var(--input-bg);border:1px solid var(--border);padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:500;color:var(--text)}
        .answer-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0;max-height:55vh;overflow-y:auto;padding-right:4px}
        .answer-cell{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--input-bg);color:var(--text);transition:.2s}
        .answer-cell.current{border-color:var(--primary);background:var(--primary);color:#fff}
        .answer-cell.correct{border-color:#10B981;background:#10B981;color:#fff}
        .answer-cell.wrong{border-color:#EF4444;background:#EF4444;color:#fff}
        .answer-stats{display:flex;justify-content:space-around;margin-bottom:12px;font-size:14px}
        .answer-stats span{font-weight:600}
        .auto-skip-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:var(--text2)}
        .auto-skip-row input{width:18px;height:18px;accent-color:var(--primary)}
        .manage-list{max-height:50vh;overflow-y:auto}
        .manage-item{padding:10px;border-bottom:1px solid var(--border);font-size:13px}
        .manage-item button{margin-left:8px}
        .settings-row{margin-bottom:16px}
        .settings-row label{display:block;margin-bottom:6px;font-weight:500;color:var(--text)}
        .settings-row .hint{font-size:12px;color:var(--text2);margin-top:4px}
        select{width:100%;padding:12px;border-radius:var(--r);border:1px solid var(--border);font-size:14px;margin-bottom:8px;background:var(--input-bg);color:var(--text);max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    </style>
</head>
<body>
<div class="toast" id="updateToast"></div>
<div class="nav">
    <div class="nav-title">刷题吧</div>
    <div class="nav-right">
        <button class="nav-btn" onclick="hardUpdate()">🔄更新</button>
        <button class="nav-btn active" id="tabPracticeBtn" onclick="switchTab('practice')">刷题</button>
        <button class="nav-btn" id="tabManageBtn" onclick="switchTab('manage')">题库</button>
    </div>
</div>
<div class="main" id="mainContent"></div>

<div class="modal-overlay" id="answerSheetModal"><div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">📋答题卡</h3><button class="btn btn-nav" onclick="closeAnswerSheet()" style="padding:4px 10px;font-size:18px;line-height:1">✕</button></div>
    <div class="answer-stats"><span>已答:<span id="sheetAnswered">0</span></span><span>正确:<span id="sheetCorrect" style="color:#10B981">0</span></span><span>错误:<span id="sheetWrong" style="color:#EF4444">0</span></span><span>总题:<span id="sheetTotal">0</span></span></div>
    <div class="answer-grid" id="answerGrid"></div>
    <div style="text-align:center;margin-top:12px"><button class="btn btn-nav" onclick="closeAnswerSheet()">关闭</button></div>
</div></div>

<div class="modal-overlay" id="settingsModal"><div class="modal-box">
    <h3>⚙️设置</h3>
    <div class="settings-row"><label>随机抽取题数</label><div style="display:flex;gap:8px;align-items:center"><input type="number" id="settingsRandomCount" min="1" value="50" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:14px"><span>题</span></div></div>
    <div class="settings-row"><label>答对几次自动移出错题</label><div style="display:flex;gap:8px;align-items:center"><input type="number" id="settingsAutoRemoveCount" min="0" value="1" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:14px"><span>次</span></div><div class="hint">达到此次数后自动移出错题。0=不自动移除</div></div>
    <div style="text-align:center;margin-top:16px"><button class="btn btn-nav" onclick="closeSettings()">取消</button><button class="btn btn-submit" onclick="saveSettings()">保存</button></div>
</div></div>

<div class="modal-overlay" id="mappingModal"><div class="modal-box">
    <h3>📋列映射</h3><div id="mappingList"></div>
    <div class="btn-row" style="justify-content:center"><button class="btn btn-nav" onclick="closeMappingModal()">取消</button><button class="btn btn-submit" id="modalConfirmBtn">下一步</button></div>
</div></div>

<script>
function hardUpdate(){location.reload(true)}
function showToast(msg){const t=document.getElementById('updateToast');t.classList.add('show');t.textContent=msg;setTimeout(()=>t.classList.remove('show'),2000)}

// ========== 数据 ==========
let banks={},currentBankName='',wrongInfo={},favSet=new Set;
let currentTab='practice',currentPage='home',currentMode=null,currentQuestions=[],currentIndex=0;
let selectedOptions=new Set,feedbackInfo=null,savedProgress={};
let pendingRows=null,pendingFileName='',pendingHeaders=[];
let questionStatus=[],randomCount=50,autoSkip=true,autoRemoveWrongCount=1;
const FOOTER='<div class="footer">苟富贵勿相忘，且用且珍惜。<br>作者：云映明川</div>';
const FIELDS=['忽略','知识类型（题目标签）','题型','题干','答案','解析','选项A','选项B','选项C','选项D','选项E','选项F','选项G'];

function loadData(){
    try{banks=JSON.parse(localStorage.getItem('quizBanks')||'{}')}catch(e){}
    try{wrongInfo=JSON.parse(localStorage.getItem('wrongInfo')||'{}')}catch(e){}
    try{favSet=new Set(JSON.parse(localStorage.getItem('favSet')||'[]'))}catch(e){}
    try{savedProgress=JSON.parse(localStorage.getItem('quizProgress')||'{}')}catch(e){}
    try{let s=JSON.parse(localStorage.getItem('appSettings')||'{}');randomCount=s.randomCount||50;autoSkip=s.autoSkip!==false;autoRemoveWrongCount=s.autoRemoveWrongCount||1}catch(e){}
    let names=Object.keys(banks);if(names.length>0){currentBankName=names[0];if(savedProgress[currentBankName])restoreProgress(currentBankName)}
}
function saveAll(){localStorage.setItem('quizBanks',JSON.stringify(banks));localStorage.setItem('wrongInfo',JSON.stringify(wrongInfo));localStorage.setItem('favSet',JSON.stringify([...favSet]));saveProgress()}
function saveProgress(){if(currentBankName&&currentMode&&currentQuestions.length>0)savedProgress[currentBankName]={mode:currentMode,questionIds:currentQuestions.map(q=>q.id),index:currentIndex,status:questionStatus};localStorage.setItem('quizProgress',JSON.stringify(savedProgress))}
function restoreProgress(bn){const p=savedProgress[bn];if(!p||!p.questionIds||!p.mode)return false;const pool=banks[bn]?.questions||[],qm={};pool.forEach(q=>{qm[q.id]=q});currentQuestions=p.questionIds.map(id=>qm[id]).filter(Boolean);if(currentQuestions.length===0){delete savedProgress[bn];saveProgress();return false}currentMode=p.mode;currentIndex=Math.min(p.index,currentQuestions.length-1);questionStatus=p.status||currentQuestions.map(()=>({answered:false,correct:false}));selectedOptions.clear();feedbackInfo=null;return true}
function findQ(id){for(let bn in banks)for(let q of banks[bn].questions)if(q.id==id)return q;return null}

function saveSettings(){
    randomCount=parseInt(document.getElementById('settingsRandomCount').value);autoRemoveWrongCount=parseInt(document.getElementById('settingsAutoRemoveCount').value);
    if(isNaN(randomCount)||randomCount<1)randomCount=50;if(isNaN(autoRemoveWrongCount)||autoRemoveWrongCount<0)autoRemoveWrongCount=1;
    localStorage.setItem('appSettings',JSON.stringify({randomCount,autoSkip,autoRemoveWrongCount}));
    document.getElementById('settingsModal').classList.remove('show');showToast('设置已保存')
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}

window.switchTab=function(tab){currentTab=tab;if(tab==='practice')currentPage='home';else currentPage='manage';document.getElementById('tabPracticeBtn').classList.toggle('active',tab==='practice');document.getElementById('tabManageBtn').classList.toggle('active',tab==='manage');render()};
window.goHome=function(){currentPage='home';render()};
window.goPage=function(page){currentPage=page;render()};
window.openSettings=function(){document.getElementById('settingsRandomCount').value=randomCount;document.getElementById('settingsAutoRemoveCount').value=autoRemoveWrongCount;document.getElementById('settingsModal').classList.add('show')};
window.toggleAutoSkip=function(cb){autoSkip=cb.checked;saveAll()};

window.importFile=function(file){
    if(!file)return;let reader=new FileReader();
    reader.onload=function(e){let data=new Uint8Array(e.target.result);let wb=XLSX.read(data,{type:'array'});let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});if(rows.length<2){alert('文件内容太少');return}pendingRows=rows;pendingFileName=file.name;showHeaderSelection()};
    reader.readAsArrayBuffer(file)
};
function showHeaderSelection(){
    let c=document.getElementById('mappingList'),h='<div class="import-help">①请在下方预览中填写表头在第几行（如第1行是注意事项，表头在第2行则填2）</div>';
    h+='<table style="width:100%;border-collapse:collapse;font-size:12px"><tr><th>行号</th><th>内容预览</th></tr>';
    for(let r=0;r<Math.min(10,pendingRows.length);r++){h+='<tr><td style="font-weight:bold;color:var(--primary)">第'+(r+1)+'行</td><td>';let cells=pendingRows[r]||[];for(let c=0;c<Math.min(8,cells.length);c++)h+='<span style="background:var(--input-bg);padding:2px 6px;border-radius:4px;margin:2px;display:inline-block;font-size:11px">'+(cells[c]||'').toString().substring(0,15)+'</span>';h+='</td></tr>'}
    h+='</table><label style="display:block;margin-top:12px;color:var(--text2)">表头在第几行？</label><input type="number" id="headerRowNum" min="1" value="1" step="1" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:14px">';
    c.innerHTML=h;document.getElementById('modalConfirmBtn').textContent='下一步：列映射';document.getElementById('modalConfirmBtn').onclick=confirmHeaderAndShowMapping;document.getElementById('mappingModal').classList.add('show')
}
window.confirmHeaderAndShowMapping=function(){
    let n=parseInt(document.getElementById('headerRowNum').value);if(isNaN(n)||n<1||n>pendingRows.length){alert('请输入有效行号');return}
    pendingHeaders=pendingRows[n-1].map(h=>String(h||'').trim());pendingRows=pendingRows.slice(n);showMappingUI()
};
function autoGuess(col){let t=col.trim(),l=t.toLowerCase();if(/^[a-g]$/i.test(t))return'选项'+t.toUpperCase();let m=l.match(/^选项\s*([a-g])$/);if(m)return'选项'+m[1].toUpperCase();m=l.match(/^([a-g])\s*选项$/);if(m)return'选项'+m[1].toUpperCase();if(/知识|类别|章|节|模块|分类|标签/.test(l))return'知识类型（题目标签）';if(/题型|类型/.test(l))return'题型';if(/题干|题目|问题|内容/.test(l))return'题干';if(/答案|正确/.test(l))return'答案';if(/解析|解释/.test(l))return'解析';return'忽略'}
function showMappingUI(){
    let c=document.getElementById('mappingList'),h='<div class="import-help"><strong>📌导入说明：</strong><br>①<strong>必须映射：题型、题干、知识类型（题目标签）、答案</strong><br>②选项A-G建议映射，其他列选"忽略"<br>③确认无误后点"确认导入"</div>';
    h+='<p style="color:var(--text2);margin-bottom:10px">请为每列选择对应含义：</p>';
    for(let i=0;i<pendingHeaders.length;i++){let col=pendingHeaders[i],g=autoGuess(col);h+='<div class="mapping-row"><span style="flex:1;word-break:break-all">'+col+'</span><select id="mapSelect_'+i+'" style="width:130px">';for(let o of FIELDS)h+='<option value="'+o+'"'+(o===g?' selected':'')+'>'+o+'</option>';h+='</select></div>'}
    c.innerHTML=h;document.getElementById('modalConfirmBtn').textContent='确认导入';document.getElementById('modalConfirmBtn').onclick=applyMapping
}
window.applyMapping=function(){
    let mapping={},hq=false,ha=false;
    for(let i=0;i<pendingHeaders.length;i++){let sel=document.getElementById('mapSelect_'+i);if(!sel)continue;let f=sel.value;if(f==='忽略')continue;mapping[f]=i;if(f==='题干')hq=true;if(f==='答案')ha=true}
    if(!hq||!ha){alert('必须指定"题干"和"答案"！');return}
    document.getElementById('mappingModal').classList.remove('show');
    let qs=[];
    for(let r=0;r<pendingRows.length;r++){let row=pendingRows[r];if(!row)continue;let qt=String(row[mapping['题干']]||'').trim();if(!qt)continue;let ans=String(row[mapping['答案']]||'').trim().toUpperCase().replace(/,/g,'').replace(/，/g,'').replace(/\s/g,'');let tp=(mapping['题型']!==undefined)?String(row[mapping['题型']]||'').trim():'';if(!tp||['单选题','多选题','判断题'].indexOf(tp)<0){if(ans==='正确'||ans==='错误'||ans==='对'||ans==='错')tp='判断题';else if(ans.length>1&&/^[A-G]+$/.test(ans))tp='多选题';else tp='单选题'}if(tp==='判断题'){if(ans==='A'||ans==='对')ans='正确';else if(ans==='B'||ans==='错')ans='错误'}let opts={};for(let k in mapping)if(k.startsWith('选项'))opts[k.replace('选项','')]=String(row[mapping[k]]||'').trim();qs.push({id:0,'知识类型':mapping['知识类型（题目标签）']!==undefined?String(row[mapping['知识类型（题目标签）']]||'').trim():'',题型:tp,题干:qt,答案:ans,解析:mapping['解析']!==undefined?String(row[mapping['解析']]||'').trim():'',选项:opts})}
    let mid=0;for(let bn in banks)for(let q of banks[bn].questions)if(q.id>mid)mid=q.id;qs.forEach(q=>{mid++;q.id=mid});
    let bn=pendingFileName.replace(/\.(xlsx|xls)$/i,'');banks[bn]={questions:qs,fileName:pendingFileName};if(!currentBankName)currentBankName=bn;
    saveAll();pendingRows=null;pendingHeaders=[];render()
};
window.closeMappingModal=function(){document.getElementById('mappingModal').classList.remove('show');pendingRows=null};
window.handleFileSelect=function(input){if(input.files&&input.files.length>0){importFile(input.files[0]);input.value=''}};

function render(){let m=document.getElementById('mainContent');if(currentPage==='quiz')m.innerHTML=renderQuiz()+FOOTER;else if(currentPage==='manage')m.innerHTML=renderManage()+FOOTER;else if(currentPage==='wrongManage')m.innerHTML=renderWrongMgr()+FOOTER;else if(currentPage==='favManage')m.innerHTML=renderFavMgr()+FOOTER;else m.innerHTML=renderHome()+FOOTER}

function renderHome(){
    let names=Object.keys(banks),h='';
    if(names.length===0){h+='<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">📁</div><div style="color:var(--text2);margin-bottom:12px">还没有题库</div><div class="format-hint"><strong>📌题库格式要求：</strong><br>表头需包含：<strong>题型、题干、知识类型、解析、答案、选项A-G</strong></div><input type="file" id="mainInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(this)"><button class="btn btn-submit" onclick="document.getElementById(\'mainInput\').click()" style="width:100%">选择题库文件</button></div>';return h}
    h+='<div class="card"><div class="card-title">当前题库</div><select onchange="switchBank(this.value)">';
    for(let n of names)h+='<option'+(n===currentBankName?' selected':'')+'>'+(n.length>25?n.substring(0,25)+'…':n)+'</option>';
    h+='</select><div style="font-size:12px;color:var(--text2)">题目数：'+(banks[currentBankName]?.questions.length||0)+'</div></div>';
    h+='<div class="card"><div class="card-title">练习模式</div><div class="mode-grid">';
    [{i:'sequence',l:'📖顺序'},{i:'random',l:'🔀随机'},{i:'exam',l:'📝考试'},{i:'wrong',l:'❌错题'},{i:'fav',l:'⭐收藏'}].forEach(m=>h+='<div class="mode-btn" onclick="startMode(\''+m.i+'\')">'+m.l+'</div>');
    h+='</div></div><div class="card"><div class="card-title">题型练习</div><div class="mode-grid">';
    h+='<div class="mode-btn" onclick="startMode(\'single_choice\')">单选题</div><div class="mode-btn" onclick="startMode(\'multi_choice\')">多选题</div><div class="mode-btn" onclick="startMode(\'judge\')">判断题</div>';
    h+='</div><div style="margin-top:8px;font-size:13px;color:var(--text2)">判断题对错练习</div><div class="mode-grid"><div class="mode-btn" onclick="startMode(\'judge_true\')">只练对</div><div class="mode-btn" onclick="startMode(\'judge_false\')">只练错</div></div></div>';
    h+='<div class="card"><div class="card-title">📖背题模式</div><div class="mode-grid">';
    [{i:'memorize_seq',l:'顺序背题'},{i:'memorize_random',l:'随机背题'},{i:'memorize_single',l:'只背单选'},{i:'memorize_multi',l:'只背多选'},{i:'memorize_judge',l:'只背判断'}].forEach(m=>h+='<div class="mode-btn" onclick="startMode(\''+m.i+'\')">'+m.l+'</div>');
    h+='</div></div><div class="card"><div class="card-title">📊错题管理</div><div style="display:flex;gap:8px"><button class="btn btn-nav" onclick="goPage(\'wrongManage\')">📋管理错题</button><button class="btn btn-nav" onclick="clearWrong()">🗑清空错题</button></div></div>';
    h+='<div class="card"><div class="card-title">⭐收藏管理</div><div style="display:flex;gap:8px"><button class="btn btn-nav" onclick="goPage(\'favManage\')">📋管理收藏</button><button class="btn btn-nav" onclick="clearFavs()">🗑清空收藏</button></div></div>';
    h+='<div style="text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center"><button class="btn btn-nav" onclick="openSettings()">⚙️设置</button><input type="file" id="extraInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(this)"><button class="btn btn-nav" onclick="document.getElementById(\'extraInput\').click()">📥导入更多</button></div>';
    return h
}

function renderQuiz(){
    if(!currentMode||currentQuestions.length===0)return'<div class="card" style="text-align:center;padding:20px">当前模式没有题目</div>';
    let q=currentQuestions[currentIndex],isMem=currentMode.startsWith('memorize'),h='<div class="card">';
    h+='<div style="margin-bottom:12px"><button class="back-btn" onclick="goHome()">←返回</button></div>';
    if(!isMem)h+='<div class="auto-skip-row"><input type="checkbox" id="autoSkipCheck" onchange="toggleAutoSkip(this)" '+(autoSkip?'checked':'')+'><label for="autoSkipCheck">✓答对自动下一题</label></div>';
    h+='<div style="font-size:12px;color:var(--text2);margin-bottom:8px">'+(q['知识类型']||'')+' | '+q['题型']+'</div><div class="question-text">'+q['题干']+'</div>';
    let labels=Object.keys(q['选项']).filter(k=>q['选项'][k]);if(q['题型']==='判断题'){labels=['A','B'];q['选项']={A:'正确',B:'错误'}}
    let correctL=[];if(isMem)correctL=(q['题型']==='判断题')?((q['答案']==='正确')?['A']:['B']):q['答案'].split('');
    for(let l of labels){let sel=selectedOptions.has(l)?' selected':'',isC=correctL.includes(l),oc=sel;if(isMem&&isC)oc+=' correct-highlight';h+='<div class="option-item'+oc+'" onclick="'+(isMem?'':'toggleOption(\''+l+'\',\''+(q['题型']==='多选题'?'multi':'single')+'\')')+'"><div class="letter">'+l+'</div>'+q['选项'][l]+'</div>'}
    h+='<div class="progress-text">'+(currentIndex+1)+'/'+currentQuestions.length+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+((currentIndex+1)/currentQuestions.length*100)+'%"></div></div>';
    if(isMem){h+='<div class="btn-row" style="justify-content:center"><button class="btn btn-nav" onclick="prevQuestion()" style="padding:16px 24px;font-size:18px">◀上一题</button><button class="btn btn-nav" onclick="nextQuestion()" style="padding:16px 24px;font-size:18px">▶下一题</button></div>';h+='<div style="text-align:center;margin-top:8px"><button class="btn btn-nav" onclick="toggleFav()">'+(favSet.has(q.id)?'★已收藏':'☆收藏')+'</button></div>';if(q['解析'])h+='<div class="analysis info" style="display:block">📖解析：'+q['解析']+'</div>'}
    else{h+='<div class="btn-row"><button class="btn btn-nav" onclick="prevQuestion()" style="padding:14px 18px;font-size:16px">◀</button><button class="btn btn-submit" onclick="submitAnswer()" style="padding:14px 18px;font-size:16px">提交</button><button class="btn btn-nav" onclick="nextQuestion()" style="padding:14px 18px;font-size:16px">▶</button><button class="btn btn-nav" onclick="toggleFav()" style="padding:14px 18px;font-size:16px">'+(favSet.has(q.id)?'★':'☆')+'</button></div>';if(feedbackInfo)h+='<div class="analysis '+(feedbackInfo.correct?'correct':'wrong')+'">'+feedbackInfo.message+'</div>'}
    h+='<div style="text-align:center;margin-top:12px"><button class="btn btn-nav" onclick="showAnswerSheet()">📋答题卡</button></div></div>';return h
}

function renderManage(){
    let names=Object.keys(banks),h='';if(names.length===0){h+='<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px">📁</div><div style="color:var(--text2)">还没有题库</div><input type="file" id="manageInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(this)"><button class="btn btn-submit" onclick="document.getElementById(\'manageInput\').click()">导入题库</button></div>';return h}
    h+='<div class="card"><div class="card-title">已导入题库</div>';
    for(let n of names)h+='<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)"><span>'+n+' ('+banks[n].questions.length+'题)</span><button class="btn btn-nav" onclick="deleteBank(\''+n+'\')" style="padding:6px 12px;font-size:12px">删除</button></div>';
    h+='<div style="text-align:center;margin-top:12px"><input type="file" id="manageInput2" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(this)"><button class="btn btn-nav" onclick="document.getElementById(\'manageInput2\').click()">📥导入更多</button></div></div>';return h
}

function renderWrongMgr(){
    let ids=Object.keys(wrongInfo).filter(id=>wrongInfo[id]),all=ids.length,today=new Date().toISOString().slice(0,10),tdy=ids.filter(id=>wrongInfo[id].lastDate===today).length;
    let h='<div class="card"><div class="card-title">📊错题统计</div><p>全部错题：<strong>'+all+'</strong>题，今日新增：<strong>'+tdy+'</strong>题</p>';
    let td={},cd={},cntd={};ids.forEach(id=>{let q=findQ(id);if(!q)return;let t=q['题型'];td[t]=(td[t]||0)+1;let c=q['知识类型']||'未分类';cd[c]=(cd[c]||0)+1;let ct=wrongInfo[id].count||1,ck=ct>=5?'5次+':ct+'次';cntd[ck]=(cntd[ck]||0)+1});
    h+='<div style="font-size:12px;margin-top:8px"><strong>按题型：</strong>'+Object.entries(td).map(([k,v])=>k+' '+v).join('，')+'</div><div style="font-size:12px"><strong>按知识类型：</strong>'+Object.entries(cd).map(([k,v])=>k+' '+v).join('，')+'</div><div style="font-size:12px"><strong>按错误次数：</strong>'+Object.entries(cntd).map(([k,v])=>k+' '+v).join('，')+'</div></div>';
    h+='<div class="card"><div class="card-title">📋错题列表</div><div class="manage-list">';ids.forEach(id=>{let q=findQ(id);if(!q)return;let info=wrongInfo[id];h+='<div class="manage-item"><span>['+q['题型']+'] '+q['题干'].substring(0,25)+'...</span><br><small>错误'+info.count+'次，最近：'+info.lastDate+'</small><button class="btn btn-nav" style="padding:4px 8px;font-size:11px;margin-left:8px" onclick="removeWrong(\''+id+'\')">移出</button></div>'});h+='</div></div>';
    h+='<div style="text-align:center;margin-top:12px"><button class="btn btn-nav" onclick="startMode(\'wrong\')">练习错题</button> <button class="btn btn-nav" onclick="goHome()">返回主页</button></div>';return h
}

function renderFavMgr(){
    let ids=[...favSet],h='<div class="card"><div class="card-title">⭐收藏管理</div>';if(ids.length===0){h+='<p style="color:var(--text2)">暂无收藏</p>'}else{
        let tg={},cg={};ids.forEach(id=>{let q=findQ(id);if(!q)return;let t=q['题型'];if(!tg[t])tg[t]=[];tg[t].push(q);let c=q['知识类型']||'未分类';if(!cg[c])cg[c]=[];cg[c].push(q)});
        h+='<div class="card-title">按题型</div>';for(let[t,qs]of Object.entries(tg)){h+='<div style="font-weight:500;margin-top:8px">'+t+' ('+qs.length+')</div>';qs.forEach(q=>{h+='<div class="manage-item"><span>'+q['题干'].substring(0,30)+'...</span><button class="btn btn-nav" style="padding:4px 8px;font-size:11px;margin-left:8px" onclick="toggleFavQ(\''+q.id+'\')">取消收藏</button></div>'})}
        h+='<div class="card-title" style="margin-top:12px">按知识类型</div>';for(let[c,qs]of Object.entries(cg)){h+='<div style="font-weight:500;margin-top:8px">'+c+' ('+qs.length+')</div>';qs.forEach(q=>{h+='<div class="manage-item"><span>'+q['题干'].substring(0,30)+'...</span><button class="btn btn-nav" style="padding:4px 8px;font-size:11px;margin-left:8px" onclick="toggleFavQ(\''+q.id+'\')">取消收藏</button></div>'})}
    }h+='</div><div style="text-align:center;margin-top:12px"><button class="btn btn-nav" onclick="startMode(\'fav\')">练习收藏</button> <button class="btn btn-nav" onclick="goHome()">返回主页</button></div>';return h
}

window.removeWrong=function(id){delete wrongInfo[id];saveAll();if(currentPage==='wrongManage')render();showToast('已移出错题')};
window.clearWrong=function(){if(confirm('确定清空所有错题？')){wrongInfo={};saveAll();if(currentPage==='home')render();showToast('错题已清空')}};
window.clearFavs=function(){if(confirm('确定清空所有收藏？')){favSet.clear();saveAll();if(currentPage==='home')render();showToast('收藏已清空')}};
window.toggleFavQ=function(id){if(favSet.has(id))favSet.delete(id);else favSet.add(id);saveAll();if(currentPage==='favManage')render()};

window.startMode=function(mode){
    if(!currentBankName||!banks[currentBankName])return;let pool=banks[currentBankName].questions;
    currentMode=mode;selectedOptions.clear();feedbackInfo=null;currentIndex=0;questionStatus=[];
    if(savedProgress[currentBankName]&&savedProgress[currentBankName].mode===mode){if(restoreProgress(currentBankName)){currentPage='quiz';render();return}}
    if(mode==='wrong')currentQuestions=Object.keys(wrongInfo).filter(id=>wrongInfo[id]).map(id=>findQ(id)).filter(Boolean);
    else if(mode==='fav')currentQuestions=[...favSet].map(id=>findQ(id)).filter(Boolean);
    else if(mode==='judge_true')currentQuestions=pool.filter(q=>q['题型']==='判断题'&&q['答案']==='正确');
    else if(mode==='judge_false')currentQuestions=pool.filter(q=>q['题型']==='判断题'&&q['答案']==='错误');
    else if(mode==='random'||mode==='memorize_random'){let cnt=Math.min(randomCount,pool.length);currentQuestions=[...pool].sort(()=>Math.random()-.5).slice(0,cnt)}
    else if(mode==='sequence')currentQuestions=[...pool];
    else if(mode==='exam')currentQuestions=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(50,pool.length));
    else if(mode==='single_choice')currentQuestions=pool.filter(q=>q['题型']==='单选题');
    else if(mode==='multi_choice')currentQuestions=pool.filter(q=>q['题型']==='多选题');
    else if(mode==='judge')currentQuestions=pool.filter(q=>q['题型']==='判断题');
    else if(mode==='memorize_seq')currentQuestions=[...pool];
    else if(mode==='memorize_single')currentQuestions=pool.filter(q=>q['题型']==='单选题');
    else if(mode==='memorize_multi')currentQuestions=pool.filter(q=>q['题型']==='多选题');
    else if(mode==='memorize_judge')currentQuestions=pool.filter(q=>q['题型']==='判断题');
    if(currentQuestions.length===0){alert('没有符合条件的题目');currentMode=null;return}
    questionStatus=currentQuestions.map(()=>({answered:false,correct:false}));saveProgress();currentPage='quiz';render()
};

window.submitAnswer=function(){
    if(!currentQuestions.length||currentIndex>=currentQuestions.length)return;
    let q=currentQuestions[currentIndex],ua=q['题型']==='多选题'?[...selectedOptions].sort().join(''):([...selectedOptions][0]||'');
    if(!ua){alert('请选择答案');return}let ok=ua.toUpperCase()===q['答案'].toUpperCase();
    feedbackInfo={correct:ok,message:ok?'✓正确！':'✗错误！正确答案：'+q['答案']+(q['解析']?'<br>解析：'+q['解析']:'')};
    if(!ok){let info=wrongInfo[q.id]||{count:0,lastDate:'',dates:[],correctStreak:0};info.count=(info.count||0)+1;info.lastDate=new Date().toISOString().slice(0,10);info.dates.push(info.lastDate);info.correctStreak=0;wrongInfo[q.id]=info}
    else{if(wrongInfo[q.id]){wrongInfo[q.id].correctStreak=(wrongInfo[q.id].correctStreak||0)+1;if(autoRemoveWrongCount>0&&wrongInfo[q.id].correctStreak>=autoRemoveWrongCount)delete wrongInfo[q.id]}}
    if(questionStatus[currentIndex]){questionStatus[currentIndex].answered=true;questionStatus[currentIndex].correct=ok}
    saveAll();render();if(ok&&autoSkip&&currentIndex<currentQuestions.length-1)setTimeout(()=>{currentIndex++;selectedOptions.clear();feedbackInfo=null;saveProgress();render()},800)
};

window.nextQuestion=function(){if(currentIndex<currentQuestions.length-1){currentIndex++;selectedOptions.clear();feedbackInfo=null;saveProgress();render()}else alert('已是最后一题')};
window.prevQuestion=function(){if(currentIndex>0){currentIndex--;selectedOptions.clear();feedbackInfo=null;saveProgress();render()}};
window.toggleOption=function(l,t){if(t==='single'){selectedOptions.clear();selectedOptions.add(l)}else selectedOptions.has(l)?selectedOptions.delete(l):selectedOptions.add(l);render()};
window.toggleFav=function(){let q=currentQuestions[currentIndex];if(q){favSet.has(q.id)?favSet.delete(q.id):favSet.add(q.id);saveAll();render()}};

window.showAnswerSheet=function(){
    let modal=document.getElementById('answerSheetModal');document.getElementById('sheetTotal').textContent=currentQuestions.length;
    let ac=0,cc=0,grid=document.getElementById('answerGrid');grid.innerHTML='';
    for(let i=0;i<currentQuestions.length;i++){let s=questionStatus[i]||{answered:false,correct:false};if(s.answered)ac++;if(s.correct)cc++;let cell=document.createElement('div');cell.className='answer-cell';if(i===currentIndex)cell.classList.add('current');else if(s.answered)cell.classList.add(s.correct?'correct':'wrong');cell.textContent=i+1;cell.onclick=(()=>{currentIndex=i;closeAnswerSheet();render()});grid.appendChild(cell)}
    document.getElementById('sheetAnswered').textContent=ac;document.getElementById('sheetCorrect').textContent=cc;document.getElementById('sheetWrong').textContent=ac-cc;modal.classList.add('show')
};
window.closeAnswerSheet=function(){document.getElementById('answerSheetModal').classList.remove('show')};
window.switchBank=function(name){currentBankName=name;if(savedProgress[name])restoreProgress(name);else{currentMode=null;currentQuestions=[];currentIndex=0;questionStatus=[];selectedOptions.clear();feedbackInfo=null}render()};
window.deleteBank=function(name){if(confirm('删除题库"'+name+'"？')){delete banks[name];saveAll();if(currentBankName===name)currentBankName=Object.keys(banks)[0]||'';render()}};

loadData();render();
</script>
</body>
</html>
