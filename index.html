<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能刷题软件</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text2: #aaa;
            --success: #4e9f3d;
            --error: #e94560;
            --border: #2a2a4a;
            --input-bg: #1a1a30;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .nav {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-title { font-size: 18px; font-weight: 700; color: var(--accent); }
        .nav-btn {
            background: var(--primary);
            color: var(--text);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }
        .nav-btn:active { transform: scale(0.95); opacity: 0.8; }
        .nav-btn.active { background: var(--accent); color: white; }
        .main { padding: 12px; max-width: 600px; margin: 0 auto; }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .card-title { font-size: 14px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
        .bank-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .bank-tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text2);
        }
        .bank-tag.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .question-type {
            font-size: 12px;
            color: var(--accent);
            background: rgba(233,69,96,0.15);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .question-text { font-size: 16px; line-height: 1.6; margin-bottom: 16px; font-weight: 500; }
        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            margin-bottom: 8px;
            background: var(--input-bg);
            border-radius: var(--radius);
            cursor: pointer;
            border: 1.5px solid transparent;
            font-size: 15px;
        }
        .option-item:active { transform: scale(0.98); }
        .option-item.selected { border-color: var(--accent); background: rgba(233,69,96,0.1); }
        .option-item .letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }
        .option-item.selected .letter { background: var(--accent); color: white; }
        .option-item .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--text2);
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .option-item.selected .checkbox { background: var(--accent); border-color: var(--accent); }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn:active { transform: scale(0.95); }
        .btn-submit { background: var(--accent); color: white; }
        .btn-nav { background: var(--primary); color: var(--text); flex: 0.5; }
        .btn-fav { flex: 0.3; background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
        .analysis {
            padding: 12px;
            border-radius: var(--radius);
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
        .analysis.show { display: block; }
        .analysis.correct { background: rgba(78,159,61,0.15); color: var(--success); }
        .analysis.wrong { background: rgba(233,69,96,0.15); color: var(--error); }
        .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .progress-text { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 4px; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mode-btn {
            padding: 12px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        .mode-btn:active { background: var(--primary); }
        .mode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .import-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .import-area:active { border-color: var(--accent); }
        .import-area input { display: none; }
        .status-bar {
            background: var(--card);
            padding: 8px 16px;
            text-align: center;
            font-size: 12px;
            color: var(--text2);
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius);
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 14px;
            margin-bottom: 8px;
        }
        .cat-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 2px;
            color: var(--text2);
        }
        .cat-item:active { background: var(--primary); }
        .cat-item.selected { background: var(--accent); color: white; }
        .question-list-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* 预览弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h3 { margin-bottom: 12px; color: var(--accent); }
        .modal-box label { display: block; margin-bottom: 6px; color: var(--text2); font-size: 14px; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius);
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 16px;
            margin-bottom: 12px;
        }
        .modal-box .btn-row { margin-top: 8px; }
        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            font-size: 12px;
        }
        .preview-table td, .preview-table th {
            border: 1px solid var(--border);
            padding: 6px 8px;
            text-align: left;
        }
        .preview-table th { background: var(--primary); color: var(--text); }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-title">智能刷题</div>
        <div>
            <button class="nav-btn active" id="tabPracticeBtn" onclick="switchTab('practice')">刷题</button>
            <button class="nav-btn" id="tabManageBtn" onclick="switchTab('manage')">题库</button>
        </div>
    </div>

    <div class="main" id="mainContent"></div>
    <div class="status-bar" id="statusBar">就绪</div>

    <!-- 表头预览弹窗 -->
    <div class="modal-overlay" id="headerModal">
        <div class="modal-box">
            <h3>🔍 请确认表头位置</h3>
            <p style="color:var(--text2);font-size:13px;margin-bottom:8px;">以下是你文件的前几行预览，哪一行是表头（列名）？</p>
            <table class="preview-table" id="previewTable"></table>
            <label>表头在第几行？</label>
            <input type="number" id="headerRowNum" min="1" value="1" step="1">
            <div class="btn-row">
                <button class="btn btn-nav" onclick="closeHeaderModal()" style="flex:0.5;">取消</button>
                <button class="btn btn-submit" onclick="confirmHeaderRow()">确认</button>
            </div>
        </div>
    </div>

    <script>
        var banks = {};
        var wrongSet = new Set();
        var favSet = new Set();
        var progress = {};
        var currentTab = 'practice';
        var currentMode = null;
        var currentQuestions = [];
        var currentIndex = 0;
        var selectedBanks = [];
        var selectedOptions = new Set();
        var selectedCat = null;
        // 导入时的暂存数据
        var pendingFile = null;
        var pendingRows = null;
        var pendingFileName = '';

        function loadData() {
            try { var s = localStorage.getItem('quizBanks'); if (s) banks = JSON.parse(s); } catch(e) { banks = {}; }
            try { var w = localStorage.getItem('wrongSet'); if (w) wrongSet = new Set(JSON.parse(w)); } catch(e) { wrongSet = new Set(); }
            try { var f = localStorage.getItem('favSet'); if (f) favSet = new Set(JSON.parse(f)); } catch(e) { favSet = new Set(); }
            try { var p = localStorage.getItem('progress'); if (p) progress = JSON.parse(p); } catch(e) { progress = {}; }
        }

        function saveAll() {
            localStorage.setItem('quizBanks', JSON.stringify(banks));
            localStorage.setItem('wrongSet', JSON.stringify(Array.from(wrongSet)));
            localStorage.setItem('favSet', JSON.stringify(Array.from(favSet)));
            localStorage.setItem('progress', JSON.stringify(progress));
        }

        function setStatus(msg) {
            document.getElementById('statusBar').textContent = msg;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabPracticeBtn').classList.toggle('active', tab === 'practice');
            document.getElementById('tabManageBtn').classList.toggle('active', tab === 'manage');
            render();
        }

        // ==================== 文件读取（不解析） ====================
        function readFileRows(file) {
            return new Promise(function(resolve, reject) {
                var ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'xlsx' || ext === 'xls') {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            var data = new Uint8Array(e.target.result);
                            var workbook = XLSX.read(data, { type: 'array' });
                            var sheet = workbook.Sheets[workbook.SheetNames[0]];
                            var rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                            resolve(rows);
                        } catch(err) {
                            reject('读取失败：' + err.message);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } else if (ext === 'docx') {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        mammoth.extractRawText({ arrayBuffer: e.target.result })
                            .then(function(result) {
                                var text = result.value;
                                var lines = text.split('\n').filter(function(l) { return l.trim(); });
                                var rows = lines.map(function(l) { return l.split('\t'); });
                                resolve(rows);
                            })
                            .catch(function(err) { reject('读取失败：' + err.message); });
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    reject('不支持的文件格式');
                }
            });
        }

        // ==================== 导入入口 ====================
        async function importFiles(files) {
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                setStatus('正在读取 ' + file.name + ' ...');
                try {
                    var rows = await readFileRows(file);
                    if (rows.length < 2) {
                        alert(file.name + '：文件内容太少');
                        continue;
                    }
                    // 弹出预览窗口，让用户选择表头行
                    pendingFile = file;
                    pendingRows = rows;
                    pendingFileName = file.name;
                    showHeaderModal(rows);
                    // 等待用户确认
                    return; // 一次只处理一个文件
                } catch(err) {
                    alert('读取 ' + file.name + ' 失败：' + err);
                }
            }
            setStatus('就绪');
        }

        // ==================== 表头预览弹窗 ====================
        function showHeaderModal(rows) {
            var table = document.getElementById('previewTable');
            var html = '';
            var maxRows = Math.min(8, rows.length);
            for (var r = 0; r < maxRows; r++) {
                html += '<tr><td style="color:var(--accent);font-weight:bold;">第' + (r+1) + '行</td>';
                var cells = rows[r] || [];
                var maxCols = Math.min(10, cells.length);
                for (var c = 0; c < maxCols; c++) {
                    html += '<td>' + (cells[c] !== undefined && cells[c] !== null ? String(cells[c]).substring(0, 30) : '') + '</td>';
                }
                html += '</tr>';
            }
            table.innerHTML = html;
            document.getElementById('headerRowNum').value = '1';
            document.getElementById('headerModal').classList.add('show');
        }

        function closeHeaderModal() {
            document.getElementById('headerModal').classList.remove('show');
            pendingFile = null;
            pendingRows = null;
            pendingFileName = '';
            setStatus('已取消导入');
        }

        function confirmHeaderRow() {
            var rowNum = parseInt(document.getElementById('headerRowNum').value);
            if (isNaN(rowNum) || rowNum < 1 || rowNum > pendingRows.length) {
                alert('请输入有效的行号（1-' + pendingRows.length + '）');
                return;
            }
            document.getElementById('headerModal').classList.remove('show');

            // 从指定行开始解析
            var dataRows = pendingRows.slice(rowNum - 1); // 第 rowNum 行作为表头
            try {
                var questions = extractQuestions(dataRows, pendingFileName);
                addQuestionsToBank(questions, pendingFileName);
            } catch(err) {
                alert('解析失败：' + err.message);
                setStatus('导入失败');
                pendingFile = null;
                pendingRows = null;
                pendingFileName = '';
                return;
            }
            pendingFile = null;
            pendingRows = null;
            pendingFileName = '';
        }

        function addQuestionsToBank(questions, fileName) {
            var maxId = 0;
            var allQs = Object.values(banks).flat();
            for (var k = 0; k < allQs.length; k++) {
                if (allQs[k].id > maxId) maxId = allQs[k].id;
            }
            for (var j = 0; j < questions.length; j++) {
                maxId++;
                questions[j].id = maxId;
            }
            var bankName = fileName.replace(/\.(xlsx|xls|docx)$/i, '');
            banks[bankName] = questions;
            saveAll();
            setStatus('成功导入 ' + questions.length + ' 道题目到「' + bankName + '」');
            render();
        }

        // ==================== 题目提取 ====================
        function extractQuestions(rows, fileName) {
            var headers = rows[0].map(function(h) { return String(h || '').trim(); });
            var questions = [];
            var colMap = {};
            for (var i = 0; i < headers.length; i++) {
                var h = headers[i].toLowerCase();
                if (h.indexOf('知识') >= 0 || h.indexOf('类别') >= 0 || h.indexOf('章') >= 0 || h.indexOf('节') >= 0) colMap['知识类型'] = i;
                else if (h.indexOf('题型') >= 0 || h.indexOf('类型') >= 0) colMap['题型'] = i;
                else if (h.indexOf('题干') >= 0 || h.indexOf('题目') >= 0 || h.indexOf('问题') >= 0 || h.indexOf('内容') >= 0) colMap['题干'] = i;
                else if (h.indexOf('答案') >= 0 || h.indexOf('正确') >= 0) colMap['答案'] = i;
                else if (h.indexOf('解析') >= 0 || h.indexOf('解释') >= 0) colMap['解析'] = i;
                else if (/^[a-g]$/i.test(headers[i].trim())) colMap['选项' + headers[i].trim().toUpperCase()] = i;
            }
            if (!('题干' in colMap) || !('答案' in colMap)) {
                throw new Error('找不到题干或答案列。表头：' + JSON.stringify(headers));
            }
            for (var j = 1; j < rows.length; j++) {
                var row = rows[j];
                if (!row || row.every(function(c) { return !c; })) continue;
                var qText = String(row[colMap['题干']] || '').trim();
                if (!qText) continue;
                var answer = String(row[colMap['答案']] || '').trim().toUpperCase()
                    .replace(/,/g, '').replace(/，/g, '').replace(/\s/g, '');
                var qtype = String(row[colMap['题型']] || '').trim();
                if (!qtype || ['单选题', '多选题', '判断题'].indexOf(qtype) < 0) {
                    if (answer === '正确' || answer === '错误' || answer === '对' || answer === '错') qtype = '判断题';
                    else if (answer.length > 1 && /^[A-G]+$/.test(answer)) qtype = '多选题';
                    else qtype = '单选题';
                }
                if (qtype === '判断题') {
                    if (answer === 'A' || answer === '对') answer = '正确';
                    else if (answer === 'B' || answer === '错') answer = '错误';
                }
                var options = {};
                for (var key in colMap) {
                    if (key.indexOf('选项') === 0) {
                        options[key.slice(2)] = String(row[colMap[key]] || '').trim();
                    }
                }
                questions.push({
                    id: null,
                    '知识类型': String(row[colMap['知识类型']] || '').trim(),
                    '题型': qtype,
                    '题干': qText,
                    '答案': answer,
                    '解析': String(row[colMap['解析']] || '').trim(),
                    '选项': options,
                    '来源文件': fileName
                });
            }
            return questions;
        }

        // ==================== 渲染 ====================
        function render() {
            var main = document.getElementById('mainContent');
            if (currentTab === 'practice') renderPractice(main);
            else renderManage(main);
        }

        function renderPractice(main) {
            var bankNames = Object.keys(banks);
            var html = '';

            if (bankNames.length === 0) {
                html += '<div class="import-area" onclick="document.getElementById(\'fileInput\').click()">';
                html += '<div style="font-size:36px;margin-bottom:8px;">📁</div>';
                html += '<div style="font-size:15px;color:#aaa;">点击导入题库文件</div>';
                html += '<div style="font-size:12px;color:#666;margin-top:4px;">支持 .xlsx / .xls / .docx</div>';
                html += '<input type="file" id="fileInput" accept=".xlsx,.xls,.docx" multiple onchange="importFiles(this.files);this.value=\'\'">';
                html += '</div>';
            } else {
                html += '<div class="card"><div class="card-title">选择题库（可多选）</div><div class="bank-list">';
                for (var i = 0; i < bankNames.length; i++) {
                    var name = bankNames[i];
                    var sel = selectedBanks.indexOf(name) >= 0 ? ' selected' : '';
                    html += '<div class="bank-tag' + sel + '" onclick="toggleBank(\'' + name + '\')">' + name + '</div>';
                }
                html += '</div>';

                html += '<div class="card-title" style="margin-top:8px;">练习模式</div>';
                html += '<div class="mode-grid">';
                var modes = [
                    { id: 'sequence', label: '📖 顺序练习' },
                    { id: 'random', label: '🔀 随机练习' },
                    { id: 'exam', label: '📝 模拟考试' },
                    { id: 'wrong', label: '❌ 错题重做' },
                    { id: 'fav', label: '⭐ 收藏练习' }
                ];
                for (var m = 0; m < modes.length; m++) {
                    var active = currentMode === modes[m].id ? ' active' : '';
                    html += '<div class="mode-btn' + active + '" onclick="startMode(\'' + modes[m].id + '\')">' + modes[m].label + '</div>';
                }
                html += '</div></div>';

                if (currentMode && currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
                    var q = currentQuestions[currentIndex];
                    var total = currentQuestions.length;
                    var pct = ((currentIndex + 1) / total) * 100;

                    html += '<div class="progress-text">' + (currentIndex + 1) + ' / ' + total + '</div>';
                    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';

                    html += '<div class="card">';
                    html += '<div class="question-header"><span class="question-type">' + q['题型'] + '</span>';
                    html += '<span style="font-size:12px;color:#aaa;">' + (q['知识类型'] || '') + '</span></div>';
                    html += '<div class="question-text">' + q['题干'] + '</div>';

                    if (q['题型'] === '判断题') {
                        var opts = ['正确', '错误'];
                        for (var o = 0; o < opts.length; o++) {
                            var sel2 = selectedOptions.has(opts[o]) ? ' selected' : '';
                            html += '<div class="option-item' + sel2 + '" onclick="toggleOption(\'' + opts[o] + '\', \'single\')"><div class="letter">' + opts[o][0] + '</div>' + opts[o] + '</div>';
                        }
                    } else if (q['题型'] === '单选题') {
                        var keys = Object.keys(q['选项']);
                        for (var k = 0; k < keys.length; k++) {
                            var key = keys[k];
                            var text = q['选项'][key];
                            if (text) {
                                var sel3 = selectedOptions.has(key) ? ' selected' : '';
                                html += '<div class="option-item' + sel3 + '" onclick="toggleOption(\'' + key + '\', \'single\')"><div class="letter">' + key + '</div>' + text + '</div>';
                            }
                        }
                    } else if (q['题型'] === '多选题') {
                        var keys2 = Object.keys(q['选项']);
                        for (var k2 = 0; k2 < keys2.length; k2++) {
                            var key2 = keys2[k2];
                            var text2 = q['选项'][key2];
                            if (text2) {

                    }

                    html += '<div class="btn-row">';

                    html += '<button class="btn btn-submit" onclick="submitAnswer()">提交</button>';

                    html += '<button class="btn btn-fav" onclick="toggleFav()" style="color:' + (isFav ? '#e94560' : '#aaa') + '">' + (isFav ? '★' : '☆') + '</button>';
                    html += '</div>';
                    html += '<div class="analysis" id="analysisBox"></div>';
                    html += '</div>';
                } else if (currentMode && currentQuestions.length === 0) {
                    html += '<div class="card" style="text-align:center;padding:40px;color:#aaa;">没有题目</div>';
                }
            }

            if (bankNames.length > 0) {
                html += '<div style="text-align:center;margin-top:8px;">';

                html += '</div>';

            main.innerHTML = html;

        function renderCatTree() {
            var treeDiv = document.getElementById('catTree');
            if (!treeDiv) return;
            var bankSelect = document.getElementById('bankSelect');
            if (!bankSelect || !banks[bankSelect.value]) return;
            var qs = banks[bankSelect.value] || [];
            var cats = [];
            var seen = {};
            for (var i = 0; i < qs.length; i++) {
                var cat = qs[i]['知识类型'];
                if (cat && !seen[cat]) { seen[cat] = true; cats.push(cat); }
            }
            function buildTree(cats) {
                var tree = {};
                for (var i = 0; i < cats.length; i++) {
                    var parts = cats[i].split('/');
                    var current = tree;
                    for (var j = 0; j < parts.length; j++) {
                        if (!current[parts[j]]) current[parts[j]] = {};
                        current = current[parts[j]];
                    }
                }
                return tree;
            }
            function renderTree(node, prefix) {
                prefix = prefix || '';
                var html = '';
                var keys = Object.keys(node);
                for (var i = 0; i < keys.length; i++) {
                    var name = keys[i];
                    var children = node[name];
                    var path = prefix ? prefix + '/' + name : name;
                    var count = 0;
                    for (var j = 0; j < qs.length; j++) {
                        var qcat = qs[j]['知识类型'] || '';
                        if (qcat === path || qcat.indexOf(path + '/') === 0) count++;
                    }
                    var sel = selectedCat === path ? ' selected' : '';
                    html += '<div class="cat-item' + sel + '" onclick="selectCat(\'' + path + '\')">📁 ' + name + ' (' + count + ')</div>';
                    if (Object.keys(children).length > 0) {
                        html += '<div style="padding-left:16px;">' + renderTree(children, path) + '</div>';
                    }
                }
                return html;
            }
            var tree = buildTree(cats);
            treeDiv.innerHTML = renderTree(tree) || '<div style="color:#aaa;padding:8px;">暂无分类</div>';
        }

        function selectCat(path) {
            selectedCat = (selectedCat === path) ? null : path;
            renderCatTree();
            onBankChange();
        }

        function onBankChange() {
            var bankSelect = document.getElementById('bankSelect');
            if (!bankSelect || !banks[bankSelect.value]) return;
            var qs = banks[bankSelect.value] || [];
            if (selectedCat) {
                qs = qs.filter(function(q) {
                    var qcat = q['知识类型'] || '';
                    return qcat === selectedCat || qcat.indexOf(selectedCat + '/') === 0;
                });
            }
            var listDiv = document.getElementById('questionList');
            if (!listDiv) return;
            var html = '';
            for (var i = 0; i < qs.length; i++) {
                var q = qs[i];
                html += '<div class="question-list-item"><span><span style="color:#e94560;">[' + q['题型'] + ']</span> ' + q['题干'].substring(0, 30) + '...</span><span style="color:#aaa;font-size:12px;">' + q['答案'] + '</span></div>';
            }
            listDiv.innerHTML = html || '<div style="color:#aaa;text-align:center;padding:20px;">无题目</div>';
        }
