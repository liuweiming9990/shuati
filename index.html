<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能刷题</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text2: #aaa;
            --success: #4e9f3d;
            --error: #e94560;
            --border: #2a2a4a;
            --input-bg: #1a1a30;
            --radius: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .nav {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        .nav-btn {
            background: var(--primary);
            color: var(--text);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }
        .nav-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        .nav-btn.active {
            background: var(--accent);
            color: white;
        }
        .main {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 50px;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .bank-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .bank-tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text2);
        }
        .bank-tag.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .question-type {
            font-size: 12px;
            color: var(--accent);
            background: rgba(233, 69, 96, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            margin-bottom: 8px;
            background: var(--input-bg);
            border-radius: var(--radius);
            cursor: pointer;
            border: 1.5px solid transparent;
            font-size: 15px;
        }
        .option-item:active {
            transform: scale(0.98);
        }
        .option-item.selected {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
        }
        .option-item .letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }
        .option-item.selected .letter {
            background: var(--accent);
            color: white;
        }
        .option-item .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--text2);
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .option-item.selected .checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-submit {
            background: var(--accent);
            color: white;
        }
        .btn-nav {
            background: var(--primary);
            color: var(--text);
            flex: 0.5;
        }
        .btn-fav {
            flex: 0.3;
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text2);
        }
        .analysis {
            padding: 12px;
            border-radius: var(--radius);
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
        .analysis.show {
            display: block;
        }
        .analysis.correct {
            background: rgba(78, 159, 61, 0.15);
            color: var(--success);
        }
        .analysis.wrong {
            background: rgba(233, 69, 96, 0.15);
            color: var(--error);
        }
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text2);
            text-align: center;
            margin-bottom: 4px;
        }
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .mode-btn {
            padding: 12px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        .mode-btn:active {
            background: var(--primary);
        }
        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .import-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .import-area input {
            display: none;
        }
        .status-bar {
            background: var(--card);
            padding: 8px 16px;
            text-align: center;
            font-size: 12px;
            color: var(--text2);
            border-top: 1px solid var(--border);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            width: 92%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            margin-bottom: 12px;
            color: var(--accent);
            text-align: center;
        }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius);
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        .preview-row {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 6px 0;
            font-size: 12px;
        }
        .preview-row .row-num {
            color: var(--accent);
            font-weight: bold;
            width: 40px;
            flex-shrink: 0;
        }
        .preview-row .row-content {
            display: flex;
            overflow-x: auto;
            gap: 6px;
        }
        .preview-row .row-content span {
            background: var(--input-bg);
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-title">智能刷题</div>
        <div>
            <button class="nav-btn active" id="tabPracticeBtn" onclick="switchTab('practice')">刷题</button>
            <button class="nav-btn" id="tabManageBtn" onclick="switchTab('manage')">题库</button>
        </div>
    </div>

    <div class="main" id="mainContent"></div>
    <div class="status-bar" id="statusBar">就绪</div>

    <div class="modal-overlay" id="headerModal">
        <div class="modal-box">
            <h3>📋 请确认表头位置</h3>
            <p style="color:var(--text2);font-size:13px;margin-bottom:10px;text-align:center;">以下是文件前几行预览<br>请选择哪一行是表头（列名）</p>
            <div id="previewContainer" style="margin-bottom:12px;"></div>
            <label style="color:var(--text2);display:block;text-align:center;margin-bottom:6px;">表头在第几行？</label>
            <input type="number" id="headerRowNum" min="1" value="1" step="1">
            <div class="btn-row">
                <button class="btn btn-nav" onclick="closeModal()">取消</button>
                <button class="btn btn-submit" onclick="confirmHeader()">确认导入</button>
            </div>
        </div>
    </div>

    <script>
        var banks = {};
        var wrongSet = new Set();
        var favSet = new Set();
        var currentTab = 'practice';
        var currentMode = null;
        var currentQuestions = [];
        var currentIndex = 0;
        var selectedBanks = [];
        var selectedOptions = new Set();
        var pendingRows = null;
        var pendingFileName = '';

        function loadData() {
            try { var s = localStorage.getItem('quizBanks'); if (s) banks = JSON.parse(s); } catch (e) {}
            try { var w = localStorage.getItem('wrongSet'); if (w) wrongSet = new Set(JSON.parse(w)); } catch (e) {}
            try { var f = localStorage.getItem('favSet'); if (f) favSet = new Set(JSON.parse(f)); } catch (e) {}
        }

        function saveAll() {
            localStorage.setItem('quizBanks', JSON.stringify(banks));
            localStorage.setItem('wrongSet', JSON.stringify(Array.from(wrongSet)));
            localStorage.setItem('favSet', JSON.stringify(Array.from(favSet)));
        }

        function setStatus(msg) {
            document.getElementById('statusBar').textContent = msg;
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.getElementById('tabPracticeBtn').classList.toggle('active', tab === 'practice');
            document.getElementById('tabManageBtn').classList.toggle('active', tab === 'manage');
            render();
        };

        // ========== 文件导入 ==========
        window.importFile = function(file) {
            if (!file) return;
            setStatus('正在读取...');
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = new Uint8Array(e.target.result);
                    var wb = XLSX.read(data, { type: 'array' });
                    var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                    if (rows.length < 2) { alert('文件内容太少'); return; }
                    pendingRows = rows;
                    pendingFileName = file.name;
                    // 预览前几行
                    var container = document.getElementById('previewContainer');
                    var html = '';
                    for (var r = 0; r < Math.min(8, rows.length); r++) {
                        html += '<div class="preview-row"><div class="row-num">第' + (r + 1) + '行</div><div class="row-content">';
                        var cells = rows[r] || [];
                        for (var c = 0; c < Math.min(8, cells.length); c++) {
                            var val = cells[c] !== undefined ? String(cells[c]).substring(0, 20) : '';
                            html += '<span>' + val + '</span>';
                        }
                        html += '</div></div>';
                    }
                    container.innerHTML = html;
                    document.getElementById('headerRowNum').value = '1';
                    document.getElementById('headerModal').classList.add('show');
                } catch (err) { alert('读取失败：' + err.message); }
            };
            reader.readAsArrayBuffer(file);
        };

        window.closeModal = function() {
            document.getElementById('headerModal').classList.remove('show');
            pendingRows = null;
        };

        window.confirmHeader = function() {
            var rowNum = parseInt(document.getElementById('headerRowNum').value);
            if (isNaN(rowNum) || rowNum < 1 || rowNum > pendingRows.length) {
                alert('请输入有效行号');
                return;
            }
            document.getElementById('headerModal').classList.remove('show');
            var dataRows = pendingRows.slice(rowNum - 1);
            var headers = dataRows[0].map(function(h) { return String(h || '').trim(); });

            // 识别列——适配你各种可能的表头名称
            var colMap = {};
            for (var i = 0; i < headers.length; i++) {
                var h = headers[i].toLowerCase();
                if (/知识|类别|章|节|模块|分类/.test(h)) colMap['知识类型'] = i;
                else if (/题型|类型/.test(h)) colMap['题型'] = i;
                else if (/题干|题目|问题|内容/.test(h)) colMap['题干'] = i;
                else if (/答案|正确/.test(h)) colMap['答案'] = i;
                else if (/解析|解释/.test(h)) colMap['解析'] = i;
                else if (/^[a-g]$/i.test(headers[i].trim())) colMap['选项' + headers[i].trim().toUpperCase()] = i;
            }
            if (!('题干' in colMap) || !('答案' in colMap)) {
                alert('找不到题干或答案列。表头：' + JSON.stringify(headers));
                return;
            }
            var questions = [];
            for (var j = 1; j < dataRows.length; j++) {
                var row = dataRows[j];
                if (!row) continue;
                var qt = String(row[colMap['题干']] || '').trim();
                if (!qt) continue;
                var ans = String(row[colMap['答案']] || '').trim().toUpperCase().replace(/,/g, '').replace(/，/g, '').replace(/\s/g, '');
                var tp = String(row[colMap['题型']] || '').trim();
                if (!tp || ['单选题', '多选题', '判断题'].indexOf(tp) < 0) {
                    if (ans === '正确' || ans === '错误' || ans === '对' || ans === '错') tp = '判断题';
                    else if (ans.length > 1 && /^[A-G]+$/.test(ans)) tp = '多选题';
                    else tp = '单选题';
                }
                if (tp === '判断题') {
                    if (ans === 'A' || ans === '对') ans = '正确';
                    else if (ans === 'B' || ans === '错') ans = '错误';
                }
                var opts = {};
                for (var key in colMap) {
                    if (/^选项/.test(key)) opts[key.slice(2)] = String(row[colMap[key]] || '').trim();
                }
                questions.push({
                    id: 0,
                    '知识类型': String(row[colMap['知识类型']] || '').trim(),
                    '题型': tp,
                    '题干': qt,
                    '答案': ans,
                    '解析': String(row[colMap['解析']] || '').trim(),
                    '选项': opts
                });
            }
            var maxId = 0;
            for (var bn in banks)
                for (var k = 0; k < banks[bn].length; k++)
                    if (banks[bn][k].id > maxId) maxId = banks[bn][k].id;
            for (var q = 0; q < questions.length; q++) { maxId++;
                questions[q].id = maxId; }
            var bankName = pendingFileName.replace(/\.(xlsx|xls)$/i, '');
            banks[bankName] = questions;
            saveAll();
            setStatus('✓ 成功导入 ' + questions.length + ' 题到「' + bankName + '」');
            pendingRows = null;
            render();
        };

        window.handleFileSelect = function(input) {
            if (input.files && input.files.length > 0) {
                importFile(input.files[0]);
                input.value = '';
            }
        };

        // ========== 渲染 ==========
        function render() {
            var m = document.getElementById('mainContent');
            if (currentTab === 'practice') renderPractice(m);
            else renderManage(m);
        }

        function renderPractice(m) {
            var names = Object.keys(banks);
            var h = '';
            if (names.length === 0) {
                h += '<div class="card" style="text-align:center;padding:40px;">';
                h += '<div style="font-size:48px;margin-bottom:12px;">📁</div>';
                h += '<div style="font-size:16px;color:var(--text2);margin-bottom:12px;">还没有题库</div>';
                h += '<input type="file" id="mainInput" accept=".xlsx,.xls" style="display:none;" onchange="handleFileSelect(this)">';
                h += '<button class="btn btn-submit" onclick="document.getElementById(\'mainInput\').click()" style="width:100%;">点击选择题库文件</button>';
                h += '<div style="font-size:12px;color:#666;margin-top:8px;">支持 .xlsx / .xls 格式</div>';
                h += '</div>';
            } else {
                h += '<div class="card"><div class="card-title">选择题库（可多选）</div><div class="bank-list">';
                for (var i = 0; i < names.length; i++) {
                    var sel = selectedBanks.indexOf(names[i]) >= 0 ? ' selected' : '';
                    h += '<span class="bank-tag' + sel + '" onclick="toggleBank(\'' + names[i] + '\')">' + names[i] + '</span>';
                }
                h += '</div></div>';

                h += '<div class="card"><div class="card-title">练习模式</div><div class="mode-grid">';
                var modes = [
                    { i: 'sequence', l: '📖 顺序练习' },
                    { i: 'random', l: '🔀 随机练习' },
                    { i: 'exam', l: '📝 模拟考试' },
                    { i: 'wrong', l: '❌ 错题重做' },
                    { i: 'fav', l: '⭐ 收藏练习' }
                ];
                for (var j = 0; j < modes.length; j++) {
                    h += '<div class="mode-btn' + (currentMode === modes[j].i ? ' active' : '') + '" onclick="startMode(\'' + modes[j].i + '\')">' + modes[j].l + '</div>';
                }
                h += '</div></div>';

                if (currentMode && currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
                    var q = currentQuestions[currentIndex];
                    h += '<div class="progress-text">' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>';
                    h += '<div class="progress-bar"><div class="progress-fill" style="width:' + ((currentIndex + 1) / currentQuestions.length * 100) + '%"></div></div>';
                    h += '<div class="card">';
                    h += '<div class="question-header"><span class="question-type">' + q['题型'] + '</span>';
                    h += '<span style="font-size:12px;color:var(--text2);">' + (q['知识类型'] || '') + '</span></div>';
                    h += '<div class="question-text">' + q['题干'] + '</div>';

                    if (q['题型'] === '判断题') {
                        for (var o
