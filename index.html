<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能刷题</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #eee; --text2: #aaa; --border: #2a2a4a; --radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .nav { background: var(--card); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-title { font-size: 18px; font-weight: 700; color: var(--accent); }
        .nav-btn { background: #0f3460; color: var(--text); border: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .nav-btn.active { background: var(--accent); color: white; }
        .main { padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
        .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .card-title { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
        .bank-tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1.5px solid var(--border); background: #1a1a30; color: var(--text2); display: inline-block; margin: 4px; }
        .bank-tag.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .question-text { font-size: 16px; line-height: 1.6; margin-bottom: 16px; }
        .option-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; background: #1a1a30; border-radius: var(--radius); cursor: pointer; border: 1.5px solid transparent; font-size: 15px; }
        .option-item.selected { border-color: var(--accent); background: rgba(233,69,96,0.1); }
        .option-item .letter { width: 28px; height: 28px; border-radius: 50%; background: #0f3460; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-weight: 700; font-size: 13px; flex-shrink: 0; }
        .btn { padding: 14px; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
        .btn-submit { background: var(--accent); color: white; }
        .btn-nav { background: #0f3460; color: var(--text); }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; }
        .analysis { padding: 12px; border-radius: var(--radius); margin-top: 12px; font-size: 14px; display: none; }
        .analysis.show { display: block; }
        .analysis.correct { background: rgba(78,159,61,0.15); color: #4e9f3d; }
        .analysis.wrong { background: rgba(233,69,96,0.15); color: var(--accent); }
        .progress-text { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 4px; }
        .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mode-btn { padding: 12px; background: #1a1a30; border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; cursor: pointer; text-align: center; }
        .mode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        .import-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 30px; text-align: center; cursor: pointer; margin-bottom: 12px; }
        .status-bar { background: var(--card); padding: 8px 16px; text-align: center; font-size: 12px; color: var(--text2); border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; }
        select { width: 100%; padding: 12px; border-radius: var(--radius); background: #1a1a30; color: var(--text); border: 1px solid var(--border); font-size: 14px; margin-bottom: 8px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--card); border-radius: var(--radius); padding: 20px; width: 92%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .modal-box h3 { margin-bottom: 12px; color: var(--accent); text-align: center; }
        .modal-box input { width: 100%; padding: 12px; border-radius: var(--radius); background: #1a1a30; color: var(--text); border: 1px solid var(--border); font-size: 16px; margin-bottom: 12px; text-align: center; }
        .preview-row { display: flex; border-bottom: 1px solid var(--border); padding: 6px 0; font-size: 12px; }
        .preview-row .row-num { color: var(--accent); font-weight: bold; width: 40px; flex-shrink: 0; }
        .preview-row .row-content { display: flex; overflow-x: auto; gap: 6px; }
        .preview-row .row-content span { background: #1a1a30; padding: 2px 8px; border-radius: 4px; white-space: nowrap; font-size: 11px; }
    </style>
</head>
<body>
<div class="nav">
    <div class="nav-title">智能刷题</div>
    <div>
        <button class="nav-btn active" id="tabPracticeBtn" onclick="switchTab('practice')">刷题</button>
        <button class="nav-btn" id="tabManageBtn" onclick="switchTab('manage')">题库</button>
    </div>
</div>
<div class="main" id="mainContent"></div>
<div class="status-bar" id="statusBar">就绪</div>

<div class="modal-overlay" id="headerModal">
    <div class="modal-box">
        <h3>📋 确认表头位置</h3>
        <p style="color:#aaa;font-size:13px;margin-bottom:10px;text-align:center;">以下是文件前几行预览<br>请选择哪一行是表头（列名）</p>
        <div id="previewContainer" style="margin-bottom:12px;"></div>
        <label style="color:#aaa;display:block;text-align:center;margin-bottom:6px;">表头在第几行？</label>
        <input type="number" id="headerRowNum" min="1" value="1" step="1">
        <div class="btn-row">
            <button class="btn btn-nav" onclick="closeModal()">取消</button>
            <button class="btn btn-submit" onclick="confirmHeader()">确认导入</button>
        </div>
    </div>
</div>

<script>
var banks = {}, wrongSet = new Set(), favSet = new Set();
var currentTab = 'practice', currentMode = null, currentQuestions = [], currentIndex = 0;
var selectedBanks = [], selectedOptions = new Set();
var pendingRows = null, pendingFileName = '';

// ========== 数据存储 ==========
function loadData() {
    try { var s = localStorage.getItem('quizBanks'); if (s) banks = JSON.parse(s); } catch(e) {}
    try { var w = localStorage.getItem('wrongSet'); if (w) wrongSet = new Set(JSON.parse(w)); } catch(e) {}
    try { var f = localStorage.getItem('favSet'); if (f) favSet = new Set(JSON.parse(f)); } catch(e) {}
}
function saveAll() {
    localStorage.setItem('quizBanks', JSON.stringify(banks));
    localStorage.setItem('wrongSet', JSON.stringify(Array.from(wrongSet)));
    localStorage.setItem('favSet', JSON.stringify(Array.from(favSet)));
}
function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }

// ========== 标签切换 ==========
window.switchTab = function(tab) {
    currentTab = tab;
    document.getElementById('tabPracticeBtn').classList.toggle('active', tab==='practice');
    document.getElementById('tabManageBtn').classList.toggle('active', tab==='manage');
    render();
};

// ========== 文件导入（核心） ==========
window.importFile = function(file) {
    if (!file) return;
    setStatus('正在读取 ' + file.name + '...');
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var data = new Uint8Array(e.target.result);
            var wb = XLSX.read(data, {type:'array'});
            var sheetName = wb.SheetNames[0];
            var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1});
            if (rows.length < 2) {
                alert('文件内容太少（少于2行）');
                setStatus('导入失败');
                return;
            }
            pendingRows = rows;
            pendingFileName = file.name;
            // 渲染预览
            var container = document.getElementById('previewContainer');
            var html = '';
            var maxRows = Math.min(10, rows.length);
            for (var r = 0; r < maxRows; r++) {
                var cells = rows[r] || [];
                html += '<div class="preview-row"><div class="row-num">第'+(r+1)+'行</div><div class="row-content">';
                var maxCols = Math.min(8, cells.length);
                for (var c = 0; c < maxCols; c++) {
                    var val = cells[c] !== undefined && cells[c] !== null ? String(cells[c]).substring(0, 25) : '';
                    html += '<span>' + val + '</span>';
                }
                if (cells.length > 8) html += '<span>...</span>';
                html += '</div></div>';
            }
            container.innerHTML = html;
            document.getElementById('headerRowNum').value = '1';
            document.getElementById('headerModal').classList.add('show');
            setStatus('请选择表头所在行');
        } catch(err) {
            alert('读取失败：' + err.message);
            setStatus('导入失败');
        }
    };
    reader.readAsArrayBuffer(file);
};

window.closeModal = function() {
    document.getElementById('headerModal').classList.remove('show');
    pendingRows = null;
    pendingFileName = '';
    setStatus('已取消导入');
};

window.confirmHeader = function() {
    var rowNum = parseInt(document.getElementById('headerRowNum').value);
    if (isNaN(rowNum) || rowNum < 1 || rowNum > pendingRows.length) {
        alert('请输入有效行号（1-' + pendingRows.length + '）');
        return;
    }
    document.getElementById('headerModal').classList.remove('show');
    setStatus('正在解析...');
    
    var dataRows = pendingRows.slice(rowNum - 1);
    var headers = dataRows[0].map(function(h) { return String(h||'').trim(); });
    
    // 识别列
    var colMap = {};
    for (var i = 0; i < headers.length; i++) {
        var h = headers[i].toLowerCase();
        if (h.indexOf('知识')>=0 || h.indexOf('类别')>=0 || h.indexOf('章')>=0 || h.indexOf('节')>=0) colMap['知识类型'] = i;
        else if (h.indexOf('题型')>=0 || h.indexOf('类型')>=0) colMap['题型'] = i;
        else if (h.indexOf('题干')>=0 || h.indexOf('题目')>=0 || h.indexOf('问题')>=0 || h.indexOf('内容')>=0) colMap['题干'] = i;
        else if (h.indexOf('答案')>=0 || h.indexOf('正确')>=0) colMap['答案'] = i;
        else if (h.indexOf('解析')>=0 || h.indexOf('解释')>=0) colMap['解析'] = i;
        else if (/^[a-g]$/i.test(headers[i].trim())) colMap['选项'+headers[i].trim().toUpperCase()] = i;
    }
    
    if (!('题干' in colMap) || !('答案' in colMap)) {
        alert('找不到题干或答案列。\n表头：' + JSON.stringify(headers) + '\n请重新选择表头行号。');
        document.getElementById('headerModal').classList.add('show');
        setStatus('请重新选择表头行号');
        return;
    }
    
    // 提取题目
    var questions = [];
    for (var r = 1; r < dataRows.length; r++) {
        var row = dataRows[r];
        if (!row) continue;
        var qText = String(row[colMap['题干']] || '').trim();
        if (!qText) continue;
        
        var answer = String(row[colMap['答案']] || '').trim().toUpperCase()
            .replace(/,/g, '').replace(/，/g, '').replace(/\s/g, '');
        var qtype = String(row[colMap['题型']] || '').trim();
        
        if (!qtype || ['单选题','多选题','判断题'].indexOf(qtype) < 0) {
            if (answer==='正确' || answer==='错误' || answer==='对' || answer==='错') qtype = '判断题';
            else if (answer.length > 1 && /^[A-G]+$/.test(answer)) qtype = '多选题';
            else qtype = '单选题';
        }
        
        if (qtype === '判断题') {
            if (answer==='A' || answer==='对') answer = '正确';
            else if (answer==='B' || answer==='错') answer = '错误';
        }
        
        var options = {};
        for (var key in colMap) {
            if (key.indexOf('选项') === 0) {
                options[key.slice(2)] = String(row[colMap[key]] || '').trim();
            }
        }
        
        questions.push({
            id: 0,
            '知识类型': String(row[colMap['知识类型']] || '').trim(),
            '题型': qtype,
            '题干': qText,
            '答案': answer,
            '解析': String(row[colMap['解析']] || '').trim(),
            '选项': options,
            '来源文件': pendingFileName
        });
    }
    
    // 分配ID
    var maxId = 0;
    for (var bn in banks) {
        for (var j = 0; j < banks[bn].length; j++) {
            if (banks[bn][j].id > maxId) maxId = banks[bn][j].id;
        }
    }
    for (var q = 0; q < questions.length; q++) {
        maxId++;
        questions[q].id = maxId;
    }
    
    var bankName = pendingFileName.replace(/\.(xlsx|xls|docx)$/i, '');
    banks[bankName] = questions;
    saveAll();
    
    pendingRows = null;
    pendingFileName = '';
    setStatus('✓ 成功导入 ' + questions.length + ' 道题目到「' + bankName + '」');
    render();
};

// ========== 渲染 ==========
function render() {
    var m = document.getElementById('mainContent');
    if (currentTab === 'practice') renderPractice(m);
    else renderManage(m);
}

function renderPractice(m) {
    var names = Object.keys(banks);
    var h = '';
    
    if (names.length === 0) {
        h += '<div class="card" style="text-align:center;padding:40px;">';
        h += '<div style="font-size:48px;margin-bottom:12px;">📁</div>';
        h += '<div style="font-size:16px;color:#aaa;margin-bottom:8px;">还没有题库</div>';
        h += '<input type="file" id="mainFileInput" accept=".xlsx,.xls" style="display:none;" onchange="handleFileSelect(this)">';
        h += '<button class="btn btn-submit" onclick="document.getElementById(\'mainFileInput\').click()" style="width:100%;">点击选择题库文件</button>';
        h += '<div style="font-size:12px;color:#666;margin-top:8px;">支持 .xlsx / .xls 格式</div>';
        h += '</div>';
    } else {
        // 题库选择
        h += '<div class="card"><div class="card-title">选择题库（点击切换）</div>';
        for (var i = 0; i < names.length; i++) {
            var sel = selectedBanks.indexOf(names[i]) >= 0 ? ' selected' : '';
            h += '<span class="bank-tag' + sel + '" onclick="toggleBank(\'' + names[i] + '\')">' + names[i] + '</span>';
        }
        h += '</div>';
        
        // 模式选择
        h += '<div class="card"><div class="card-title">练习模式</div><div class="mode-grid">';
        var modes = [
            {i:'sequence', l:'📖 顺序练习'},
            {i:'random', l:'🔀 随机练习'},
            {i:'exam', l:'📝 模拟考试'},
            {i:'wrong', l:'❌ 错题重做'},
            {i:'fav', l:'⭐ 收藏练习'}
        ];
        for (var j = 0; j < modes.length; j++) {
            h += '<div class="mode-btn' + (currentMode===modes[j].i?' active':'') + '" onclick="startMode(\''+modes[j].i+'\')">' + modes[j].l + '</div>';
        }
        h += '</div></div>';
        
        // 题目显示
        if (currentMode && currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
            var q = currentQuestions[currentIndex];
            h += '<div class="progress-text">' + (currentIndex+1) + ' / ' + currentQuestions.length + '</div>';
            h += '<div class="progress-bar"><div class="progress-fill" style="width:'+((currentIndex+1)/currentQuestions.length*100)+'%"></div></div>';
            h += '<div class="card">';
            h += '<div style="color:#aaa;font-size:12px;margin-bottom:8px;">' + (q['知识类型']||'') + ' | ' + q['题型'] + '</div>';
            h += '<div class="question-text">' + q['题干'] + '</div>';
            
            if (q['题型'] === '判断题') {
                for (var o = 0; o < 2; o++) {
                    var opt = ['正确','错误'][o];
                    var s = selectedOptions.has(opt) ? ' selected' : '';
                    h += '<div class="option-item' + s + '" onclick="toggleOption(\''+opt+'\',\'single\')"><div class="letter">'+opt[0]+'</div>'+opt+'</div>';
                }
            } else if (q['题型'] === '单选题') {
                for (var key in q['选项']) {
                    if (q['选项'][key]) {
                        var s2 = selectedOptions.has(key) ? ' selected' : '';
                        h += '<div class="option-item' + s2 + '" onclick="toggleOption(\''+key+'\',\'single\')"><div class="letter">'+key+'</div>'+q['选项'][key]+'</div>';
                    }
                }
            } else if (q['题型'] === '多选题') {
                for (var k2 in q['选项']) {
                    if (q['选项'][k2]) {
                        var s3 = selectedOptions.has(k2) ? ' selected' : '';
                        h += '<div class="option-item' + s3 + '" onclick="toggleOption(\''+k2+'\',\'multi\')"><div class="letter">'+(s3?'✓':'')+'</div>'+k2+'. '+q['选项'][k2]+'</div>';
                    }
                }
            }
            
            h += '<div class="btn-row">';
            h += '<button class="btn btn-nav" onclick="prevQuestion()">◀</button>';
            h += '<button class="btn btn-submit" onclick="submitAnswer()">提交</button>';
            h += '<button class="btn btn-nav" onclick="nextQuestion()">▶</button>';
            h += '<button class="btn btn-nav" onclick="toggleFav()" style="flex:0.3;">'+(favSet.has(q.id)?'★':'☆')+'</button>';
            h += '</div>';
            h += '<div class="analysis" id="analysisBox"></div>';
            h += '</div>';
        }
        
        // 底部导入按钮
        h += '<div style="text-align:center;margin-top:12px;">';
        h += '<input type="file" id="extraFileInput" accept=".xlsx,.xls" style="display:none;" onchange="handleFileSelect(this)">';
        h += '<button class="btn btn-nav" onclick="document.getElementById(\'extraFileInput\').click()">📥 导入更多题库</button>';
        h += '</div>';
    }
    m.innerHTML = h;
}

function renderManage(m) {
    var names = Object.keys(banks);
    var h = '';
    
    if (names.length === 0) {
        h += '<div class="card" style="text-align:center;padding:40px;">';
        h += '<div style="font-size:48px;margin-bottom:12px;">📁</div>';
        h += '<div style="font-size:16px;color:#aaa;margin-bottom:8px;">还没有题库</div>';
        h += '<input type="file" id="manageFileInput" accept=".xlsx,.xls" style="display:none;" onchange="handleFileSelect(this)">';
        h += '<button class="btn btn-submit" onclick="document.getElementById(\'manageFileInput\').click()" style="width:100%;">点击选择题库文件</button>';
        h += '</div>';
    } else {
        h += '<div class="card"><div class="card-title">题库管理</div>';
        h += '<select id="bankSelect" onchange="onBankChange()">';
        for (var i = 0; i < names.length; i++) {
            h += '<option>' + names[i] + '</option>';
        }
        h += '</select>';
        h += '<div id="qList" style="max-height:400px;overflow-y:auto;"></div>';
        h += '<div class="btn-row">';
        h += '<input type="file" id="manageFileInput2" accept=".xlsx,.xls" style="display:none;" onchange="handleFileSelect(this)">';
        h += '<button class="btn btn-nav" onclick="document.getElementById(\'manageFileInput2\').click()">📥 导入</button>';
        h += '<button class="btn btn-nav" onclick="deleteBank()" style="color:#e94560;">🗑 删除</button>';
        h += '</div>';
        h += '</div>';
    }
    m.innerHTML = h;
    if (names.length > 0) onBankChange();
}

// ========== 文件选择处理 ==========
window.handleFileSelect = function(input) {
    if (input.files && input.files.length > 0) {
        importFile(input.files[0]);
        input.value = ''; // 清空以便重复选择同一文件
    }
};

// ========== 题库管理 ==========
window.onBankChange = function() {
    var sel = document.getElementById('bankSelect');
    if (!sel) return;
    var qs = banks[sel.value] || [];
    var list = document.getElementById('qList');
    var h = '';
    for (var i = 0; i < qs.length; i++) {
        h += '<div style="padding:10px;border-bottom:1px solid #2a2a4a;font-size:13px;">';
        h += '<span style="color:#e94560;">['+qs[i]['题型']+']</span> ';
        h += qs[i]['题干'].substring(0, 35) + '...';
        h += ' <span style="color:#aaa;float:right;">答案:'+qs[i]['答案']+'</span>';
        h += '</div>';
    }
    list.innerHTML = h || '<div style="color:#aaa;text-align:center;padding:30px;">该题库无题目</div>';
};

window.deleteBank = function() {
    var sel = document.getElementById('bankSelect');
    if (!sel) return;
    var name = sel.value;
    if (confirm('确定删除题库「' + name + '」？此操作不可恢复。')) {
        delete banks[name];
        saveAll();
        selectedBanks = selectedBanks.filter(function(b) { return b !== name; });
        currentMode = null;
        currentQuestions = [];
        render();
        setStatus('已删除「' + name + '」');
    }
};

// ========== 刷题逻辑 ==========
window.toggleBank = function(name) {
    var idx = selectedBanks.indexOf(name);
    if (idx >= 0) selectedBanks.splice(idx, 1);
    else selectedBanks.push(name);
    render();
};

window.startMode = function(mode) {
    if (selectedBanks.length === 0 && mode !== 'wrong' && mode !== 'fav') {
        setStatus('请先选择题库');
        return;
    }
    currentMode = mode;
    selectedOptions.clear();
    currentIndex = 0;
    currentQuestions = [];
    
    if (mode === 'sequence' || mode === 'random' || mode === 'exam') {
        for (var i = 0; i < selectedBanks.length; i++) {
            var qs = banks[selectedBanks[i]] || [];
            for (var j = 0; j < qs.length; j++) currentQuestions.push(qs[j]);
        }
        if (mode === 'random' || mode === 'exam') {
            for (var k = currentQuestions.length-1; k > 0; k--) {
                var r = Math.floor(Math.random() * (k+1));
                var tmp = currentQuestions[k];
                currentQuestions[k] = currentQuestions[r];
                currentQuestions[r] = tmp;
            }
        }
        if (mode === 'exam') currentQuestions = currentQuestions.slice(0, Math.min(50, currentQuestions.length));
    } else if (mode === 'wrong') {
        var all = [];
        for (var bn in banks) for (var j = 0; j < banks[bn].length; j++) all.push(banks[bn][j]);
        for (var i = 0; i < all.length; i++) if (wrongSet.has(all[i].id)) currentQuestions.push(all[i]);
    } else if (mode === 'fav') {
        var all2 = [];
        for (var bn in banks) for (var j = 0; j < banks[bn].length; j++) all2.push(banks[bn][j]);
        for (var i = 0; i < all2.length; i++) if (favSet.has(all2[i].id)) currentQuestions.push(all2[i]);
    }
    
    render();
    setStatus('加载 ' + currentQuestions.length + ' 道题目');
};

window.toggleOption = function(val, type) {
    if (type === 'single') { selectedOptions.clear(); selectedOptions.add(val); }
    else { if (selectedOptions.has(val)) selectedOptions.delete(val); else selectedOptions.add(val); }
    render();
};

window.submitAnswer = function() {
    if (!currentQuestions.length) return;
    var q = currentQuestions[currentIndex];
    var ua;
    if (q['题型'] === '多选题') {
        ua = Array.from(selectedOptions).sort().join('');
    } else {
        ua = Array.from(selectedOptions)[0] || '';
    }
    if (!ua) { setStatus('请选择答案'); return; }
    var ok = ua.toUpperCase() === q['答案'].toUpperCase();
    var box = document.getElementById('analysisBox');
    if (box) {
        box.className = 'analysis show ' + (ok ? 'correct' : 'wrong');
        box.innerHTML = ok ? '✓ 正确！' : '✗ 错误！正确答案：' + q['答案'] + (q['解析'] ? '<br>' + q['解析'] : '');
    }
    if (!ok) wrongSet.add(q.id);
    saveAll();
    setStatus(ok ? '正确 ✓' : '错误 ✗');
    render();
};

window.nextQuestion = function() {
    if (currentIndex < currentQuestions.length-1) { currentIndex++; selectedOptions.clear(); render(); }
    else setStatus('已经是最后一题');
};
window.prevQuestion = function() {
    if (currentIndex > 0) { currentIndex--; selectedOptions.clear(); render(); }
};
window.toggleFav = function() {
    var q = currentQuestions[currentIndex];
    if (q) { if (favSet.has(q.id)) favSet.delete(q.id); else favSet.add(q.id); saveAll(); render(); }
};

// ========== 启动 ==========
loadData();
render();
</script>
</body>
</html>
