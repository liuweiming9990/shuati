<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>刷题吧</title>
    <link rel="apple-touch-icon" sizes="180x180" href="tubiao.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="刷题吧">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3B82F6">
    <meta name="application-name" content="刷题吧">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-touch-fullscreen" content="yes">
    <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%E5%88%B7%E9%A2%98%E5%90%A7%22%2C%22short_name%22%3A%22%E5%88%B7%E9%A2%98%E5%90%A7%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f3f4f6%22%2C%22theme_color%22%3A%22%233B82F6%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22tubiao.PNG%22%2C%22sizes%22%3A%22180x180%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #fff;
            --primary: #3B82F6;
            --accent: #e94560;
            --text: #1f2937;
            --text2: #6b7280;
            --border: #e5e7eb;
            --input-bg: #f9fafb;
            --r: 12px;
            --fs: 15px;
            --opt-gap: 8px;
            --opt-pad: 12px;
            --safe-top: 0px;
            --safe-bottom: 0px
        }
        .theme-night {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #4a6cf7;
            --accent: #e94560;
            --text: #eee;
            --text2: #aaa;
            --border: #2a2a4a;
            --input-bg: #1a1a30
        }
        .theme-eye {
            --bg: #f5f0e8;
            --card: #fffaf0;
            --primary: #5a8a6a;
            --accent: #c0392b;
            --text: #3e3e3e;
            --text2: #8a8a8a;
            --border: #d5c9b5;
            --input-bg: #faf5eb
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none
        }
        input, textarea, select, .option-item, .mode-btn, .btn, .nav-btn, .answer-cell, .setting-adjust-btn {
            -webkit-user-select: auto;
            user-select: auto;
            -webkit-touch-callout: default
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding-top: var(--safe-top);
            padding-bottom: calc(1rem + var(--safe-bottom));
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden
        }
        html { height: -webkit-fill-available }
        .nav {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 100;
            padding-top: calc(12px + var(--safe-top));
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px)
        }
        .nav-title { font-size: 18px; font-weight: 700; color: var(--primary) }
        .nav-right { display: flex; gap: 6px; align-items: center }
        .nav-btn {
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
            -webkit-appearance: none;
            appearance: none
        }
        .nav-btn.active { background: var(--primary); color: #fff; border-color: var(--primary) }
        .main { padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 24px }
        .card {
            background: var(--card);
            border-radius: var(--r);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(0,0,0,.05);
            -webkit-transform: translateZ(0);
            transform: translateZ(0)
        }
        .card-title { font-size: 14px; color: var(--text2); margin-bottom: 8px; font-weight: 500; word-break: break-word }
        .question-text { font-size: var(--fs); line-height: 1.6; margin-bottom: 16px; font-weight: 500; word-break: break-word }
        .option-item {
            display: flex;
            align-items: center;
            padding: var(--opt-pad);
            margin-bottom: var(--opt-gap);
            background: var(--input-bg);
            border-radius: var(--r);
            cursor: pointer;
            border: 1.5px solid var(--border);
            font-size: var(--fs);
            transition: .2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation
        }
        .option-item:active { opacity: 0.8; transform: scale(0.98) }
        .option-item.selected { border-color: var(--primary); background: rgba(59,130,246,.05) }
        .option-item.correct-highlight { border-color: #10B981; background: rgba(16,185,129,.08) }
        .option-item .letter {
            width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
            background: rgba(59,130,246,.1); display: flex; align-items: center; justify-content: center;
            margin-right: 10px; font-weight: 700; font-size: 13px; flex-shrink: 0; color: var(--primary)
        }
        .option-item.selected .letter { background: var(--primary); color: #fff }
        .option-item.correct-highlight .letter { background: #10B981; color: #fff }
        .btn {
            padding: 14px; border: none; border-radius: var(--r); font-size: 15px; font-weight: 600; cursor: pointer;
            -webkit-appearance: none; appearance: none; touch-action: manipulation; min-height: 48px
        }
        .btn:active { opacity: 0.8; transform: scale(0.97) }
        .btn-submit { background: var(--primary); color: #fff }
        .btn-nav { background: var(--input-bg); color: var(--text); border: 1px solid var(--border) }
        .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap }
        .btn-row .btn { flex: 1; min-width: 48px }
        .analysis { padding: 12px; border-radius: var(--r); margin-top: 12px; font-size: 14px; line-height: 1.5 }
        .analysis.correct { background: #f0fdf4; color: #166534 }
        .analysis.wrong { background: #fee2e2; color: #b91c1c }
        .analysis.info { background: #f0fdf4; color: #166534 }
        .progress-text { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 4px }
        .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 12px 0; overflow: hidden }
        .progress-fill { height: 100%; background: var(--primary); transition: width .3s }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px }
        .mode-btn {
            padding: 12px; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: var(--r);
            color: var(--text); font-size: 14px; cursor: pointer; text-align: center;
            -webkit-appearance: none; appearance: none; touch-action: manipulation; min-height: 44px;
            display: flex; align-items: center; justify-content: center
        }
        .mode-btn:active { opacity: 0.8; transform: scale(0.97) }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            height: -webkit-fill-available; background: rgba(0,0,0,.5); z-index: 200;
            justify-content: center; align-items: center; -webkit-overflow-scrolling: touch;
            overflow-y: auto; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px)
        }
        .modal-overlay.show { display: flex }
        .modal-box {
            background: var(--card); border-radius: var(--r); padding: 20px; width: 92%; max-width: 600px;
            max-height: 85vh; max-height: calc(var(--vh,1vh)*85); overflow-y: auto; color: var(--text);
            -webkit-overflow-scrolling: touch; -webkit-transform: translateZ(0); transform: translateZ(0)
        }
        .modal-box h3 { margin-bottom: 12px; color: var(--primary); text-align: center }
        .footer {
            text-align: center; padding: 20px 12px; color: var(--text2); font-size: 13px;
            border-top: 1px solid var(--border); margin-top: 24px
        }
        .import-help {
            background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 10px 12px;
            margin-bottom: 12px; font-size: 12px; color: #166534; line-height: 1.6
        }
        .import-help strong { color: #15803d }
        .format-hint {
            background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
            margin: 8px 0; font-size: 12px; color: var(--text2); line-height: 1.6
        }
        .format-hint strong { color: var(--text) }
        .toast {
            position: fixed; top: 20px; top: calc(20px + var(--safe-top)); left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; z-index: 2000;
            opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; font-size: 14px
        }
        .toast.show { opacity: 1 }
        .back-btn {
            display: inline-flex; align-items: center; gap: 4px; background: var(--input-bg);
            border: 1px solid var(--border); padding: 8px 14px; border-radius: 20px; font-size: 13px;
            cursor: pointer; font-weight: 500; color: var(--text); -webkit-appearance: none; appearance: none
        }
        .restart-btn {
            display: inline-flex; align-items: center; gap: 4px; background: var(--input-bg);
            border: 1px solid var(--border); padding: 8px 14px; border-radius: 20px; font-size: 13px;
            cursor: pointer; font-weight: 500; color: var(--text); -webkit-appearance: none; appearance: none;
            margin-left: 8px
        }
        .answer-grid {
            display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin: 16px 0;
            max-height: 55vh; max-height: calc(var(--vh,1vh)*55); overflow-y: auto; padding-right: 4px;
            -webkit-overflow-scrolling: touch
        }
        .answer-cell {
            width: 100%; aspect-ratio: 1; height: 0; padding-bottom: 100%; position: relative;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 600; cursor: pointer; border: 2px solid var(--border);
            background: var(--input-bg); color: var(--text); transition: .2s; touch-action: manipulation
        }
        @supports (aspect-ratio: 1) {
            .answer-cell { height: auto; padding-bottom: 0; position: static }
        }
        .answer-cell span { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) }
        @supports (aspect-ratio: 1) {
            .answer-cell span { position: static; transform: none }
        }
        .answer-cell.current { border-color: var(--primary); background: var(--primary); color: #fff }
        .answer-cell.correct { border-color: #10B981; background: #10B981; color: #fff }
        .answer-cell.wrong { border-color: #EF4444; background: #EF4444; color: #fff }
        .answer-stats { display: flex; justify-content: space-around; margin-bottom: 12px; font-size: 14px; flex-wrap: wrap; gap: 4px }
        .answer-stats span { font-weight: 600 }
        .auto-skip-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; color: var(--text2) }
        .auto-skip-row input { width: 18px; height: 18px; accent-color: var(--primary); -webkit-appearance: checkbox; appearance: checkbox }
        .manage-list { max-height: 50vh; max-height: calc(var(--vh,1vh)*50); overflow-y: auto; -webkit-overflow-scrolling: touch }
        .manage-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px }
        .manage-item button { margin-left: 8px }
        .settings-row { margin-bottom: 16px }
        .settings-row label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text) }
        .settings-row .hint { font-size: 12px; color: var(--text2); margin-top: 4px }
        select {
            width: 100%; padding: 12px; border-radius: var(--r); border: 1px solid var(--border);
            font-size: 14px; margin-bottom: 8px; background: var(--input-bg); color: var(--text);
            max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            -webkit-appearance: auto; appearance: auto
        }
        .theme-btn-group { display: flex; gap: 8px }
        .theme-btn {
            flex: 1; padding: 10px; border-radius: var(--r); border: 1.5px solid var(--border);
            background: var(--input-bg); color: var(--text); font-size: 13px; cursor: pointer;
            text-align: center; transition: .2s; -webkit-appearance: none; appearance: none; touch-action: manipulation
        }
        .theme-btn.active { background: var(--primary); color: #fff; border-color: var(--primary) }
        .settings-reset-btn {
            padding: 12px; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: var(--r);
            color: var(--text); font-size: 14px; cursor: pointer; text-align: center; width: 100%; display: block;
            -webkit-appearance: none; appearance: none; touch-action: manipulation; min-height: 44px
        }
        .mapping-row {
            display: flex; justify-content: space-between; align-items: center; padding: 8px 0;
            border-bottom: 1px solid var(--border); gap: 12px
        }
        .setting-control-row { display: flex; align-items: center; justify-content: center; gap: 12px }
        .setting-adjust-btn {
            width: 44px; height: 44px; min-width: 44px; min-height: 44px; border-radius: 50%;
            border: 2px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .2s;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
            -webkit-appearance: none; appearance: none
        }
        .setting-adjust-btn:active { background: var(--primary); color: #fff; border-color: var(--primary) }
        .setting-value-display { min-width: 50px; text-align: center; font-weight: 700; color: var(--primary); font-size: 18px }
        .setting-reset-mini {
            margin-top: 8px; padding: 8px; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 20px; font-size: 12px; color: var(--text2); cursor: pointer; width: 100%;
            transition: .2s; -webkit-appearance: none; appearance: none
        }
        .setting-reset-mini:hover { color: var(--primary); border-color: var(--primary) }
        .range-container { display: flex; align-items: center; gap: 10px }
        .range-container span { font-size: 12px; color: var(--text2); white-space: nowrap }
        input[type="range"] {
            flex: 1; height: 6px; accent-color: var(--primary); cursor: pointer;
            -webkit-appearance: none; appearance: none; background: var(--border); border-radius: 3px; outline: none
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%;
            background: var(--primary); cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 4px rgba(0,0,0,.2)
        }
        input[type="range"]::-moz-range-thumb {
            width: 24px; height: 24px; border-radius: 50%; background: var(--primary); cursor: pointer;
            border: 2px solid #fff; box-shadow: 0 2px 4px rgba(0,0,0,.2)
        }
        input[type="number"] { -webkit-appearance: none; appearance: none; -moz-appearance: textfield }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0 }
        @supports (padding-top: constant(safe-area-inset-top)) {
            body { padding-top: constant(safe-area-inset-top); padding-bottom: calc(1rem + constant(safe-area-inset-bottom)) }
            .nav { padding-top: calc(12px + constant(safe-area-inset-top)) }
            .toast { top: calc(20px + constant(safe-area-inset-top)) }
        }
        @supports (padding-top: env(safe-area-inset-top)) {
            body { padding-top: env(safe-area-inset-top); padding-bottom: calc(1rem + env(safe-area-inset-bottom)) }
            .nav { padding-top: calc(12px + env(safe-area-inset-top)) }
            .toast { top: calc(20px + env(safe-area-inset-top)) }
        }
        @media screen and (max-width: 768px) {
            input[type="text"], input[type="number"], input[type="search"], textarea, select { font-size: 16px !important }
        }
        .danger-confirm-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.6); z-index: 300; justify-content: center; align-items: center
        }
        .danger-confirm-overlay.show { display: flex }
        .danger-confirm-box {
            background: var(--card); border-radius: var(--r); padding: 24px; width: 90%; max-width: 400px;
            text-align: center; border: 2px solid var(--border)
        }
        .danger-confirm-box .icon { font-size: 40px; margin-bottom: 8px }
        .danger-confirm-box .title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px }
        .danger-confirm-box .desc { font-size: 13px; color: var(--text2); margin-bottom: 12px; line-height: 1.5 }
        .danger-confirm-box input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border);
            font-size: 16px; text-align: center; background: var(--input-bg); color: var(--text); margin-bottom: 12px
        }
        .danger-confirm-box .btn-row { display: flex; gap: 8px; margin-top: 0 }
        .danger-confirm-box .btn-cancel {
            flex: 1; padding: 12px; border-radius: var(--r); border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text); font-size: 14px; cursor: pointer
        }
        .danger-confirm-box .btn-confirm {
            flex: 1; padding: 12px; border-radius: var(--r); border: none; background: var(--primary);
            color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; opacity: 0.4; pointer-events: none; transition: .2s
        }
        .danger-confirm-box .btn-confirm.active { opacity: 1; pointer-events: auto }

        /* 考试配置弹窗样式 */
        .exam-config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px }
        .exam-config-row label { width: 70px; font-weight: 500 }
        .exam-config-row input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 14px }
        .exam-config-hint { font-size: 12px; color: var(--text2); margin-bottom: 16px }
        .exam-priority-row { display: flex; gap: 8px; margin-bottom: 12px }
        .exam-priority-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 13px; cursor: pointer; text-align: center }
        .exam-priority-btn.active { background: var(--primary); color: #fff; border-color: var(--primary) }
    </style>
</head>
<body>
    <div class="toast" id="updateToast"></div>
    <div class="nav">
        <div class="nav-title">刷题吧</div>
        <div class="nav-right">
            <button class="nav-btn" onclick="hardUpdate()">更新</button>
            <button class="nav-btn active" id="tabPracticeBtn" onclick="switchTab('practice')">刷题</button>
            <button class="nav-btn" id="tabManageBtn" onclick="switchTab('manage')">题库</button>
        </div>
    </div>
    <div class="main" id="mainContent"></div>

    <div class="danger-confirm-overlay" id="dangerConfirmOverlay">
        <div class="danger-confirm-box">
            <div class="icon">⚠️</div>
            <div class="title" id="dangerTitle">确认操作</div>
            <div class="desc" id="dangerDesc">此操作不可恢复</div>
            <input type="text" id="dangerInput" placeholder="输入"确认清空"确认" autocomplete="off">
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeDangerConfirm()">取消</button>
                <button class="btn-confirm" id="dangerConfirmBtn" onclick="executeDangerAction()">确认清空</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="answerSheetModal">
        <div class="modal-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <h3 style="margin:0">答题卡</h3>
                <button class="btn btn-nav" onclick="closeAnswerSheet()" style="padding:4px 10px;font-size:18px;line-height:1;min-height:auto">✕</button>
            </div>
            <div class="answer-stats" id="answerStatsContainer">
                <span>已答:<span id="sheetAnswered">0</span></span>
                <span>正确:<span id="sheetCorrect" style="color:#10B981">0</span></span>
                <span>错误:<span id="sheetWrong" style="color:#EF4444">0</span></span>
                <span>总题:<span id="sheetTotal">0</span></span>
            </div>
            <div id="answerSheetContent"></div>
            <div style="text-align:center;margin-top:12px">
                <button class="btn btn-nav" onclick="closeAnswerSheet()">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <h3>设置</h3>
            <div class="settings-row">
                <label>随机抽取题数（随机练习/背题）</label>
                <div style="display:flex;gap:8px;align-items:center">
                    <input type="number" id="settingsRandomCount" min="1" value="50" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:16px;background:var(--input-bg);color:var(--text);min-height:44px">
                    <span>题</span>
                </div>
            </div>
            <div class="settings-row">
                <label>答对几次自动移出错题</label>
                <div style="display:flex;gap:8px;align-items:center">
                    <input type="number" id="settingsAutoRemoveCount" min="0" value="1" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:16px;background:var(--input-bg);color:var(--text);min-height:44px">
                    <span>次</span>
                </div>
                <div class="hint">达到此次数后自动移出错题。0=不自动移除</div>
            </div>
            <div class="settings-row">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                    <input type="checkbox" id="settingsHideDone" style="width:20px;height:20px;accent-color:var(--primary)"> 已做题不显示
                </label>
                <div class="hint">顺序/随机练习中，已答对的题目将不再出现</div>
            </div>
            <div class="settings-row">
                <label>主题模式</label>
                <div class="theme-btn-group">
                    <div class="theme-btn active" data-theme="day" onclick="setTheme('day')">日间</div>
                    <div class="theme-btn" data-theme="night" onclick="setTheme('night')">夜间</div>
                    <div class="theme-btn" data-theme="eye" onclick="setTheme('eye')">护眼</div>
                </div>
            </div>
            <div class="settings-row">
                <label>字体大小</label>
                <div class="range-container">
                    <span>小</span>
                    <input type="range" id="settingsFontSize" min="13" max="22" value="15" step="1">
                    <span>大</span>
                </div>
                <div class="setting-control-row" style="margin-top:8px">
                    <button type="button" class="setting-adjust-btn" onclick="adjustFontSize(-1)">-</button>
                    <span class="setting-value-display" id="fontSizeDisplay">15px</span>
                    <button type="button" class="setting-adjust-btn" onclick="adjustFontSize(1)">+</button>
                </div>
                <button type="button" class="setting-reset-mini" onclick="resetFontSize()">恢复默认 (15px)</button>
            </div>
            <div class="settings-row">
                <label>选项间距</label>
                <div class="range-container">
                    <span>窄</span>
                    <input type="range" id="settingsOptGap" min="4" max="20" value="8" step="1">
                    <span>宽</span>
                </div>
                <div class="setting-control-row" style="margin-top:8px">
                    <button type="button" class="setting-adjust-btn" onclick="adjustOptGap(-1)">-</button>
                    <span class="setting-value-display" id="optGapDisplay">8px</span>
                    <button type="button" class="setting-adjust-btn" onclick="adjustOptGap(1)">+</button>
                </div>
                <button type="button" class="setting-reset-mini" onclick="resetOptGap()">恢复默认 (8px)</button>
            </div>
            <div class="settings-row">
                <button class="settings-reset-btn" onclick="window.open('changelog.md')">版本日志</button>
                <div class="hint">查看迭代更新记录</div>
            </div>
            <div style="text-align:center;margin-top:16px">
                <button class="btn btn-nav" onclick="closeSettings()">取消</button>
                <button class="btn btn-submit" onclick="saveSettings()">保存</button>

    <!-- 考试配置弹窗 -->
    <div class="modal-overlay" id="examConfigModal">
        <div class="modal-box">
            <h3>考试配置</h3>
            <div id="examConfigContent"></div>
            <div style="display:flex;gap:8px;margin-top:16px">
                <button class="btn btn-nav" onclick="closeExamConfig()" style="flex:1">取消</button>
                <button class="btn btn-submit" onclick="startExamWithConfig()" style="flex:1">开始考试</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="mappingModal">
        <div class="modal-box">
            <h3>列映射</h3>
            <div id="mappingList"></div>
            <div class="btn-row" style="justify-content:center">
                <button class="btn btn-nav" onclick="closeMappingModal()">取消</button>
                <button class="btn btn-submit" id="modalConfirmBtn">下一步</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            function setVH() { var vh = window.innerHeight*0.01; document.documentElement.style.setProperty('--vh', vh+'px'); }
            setVH(); window.addEventListener('resize', setVH);
            window.addEventListener('orientationchange', function() { setTimeout(setVH, 100); });
            function setSafeArea() {
                var style = getComputedStyle(document.documentElement);
                var safeTop = style.getPropertyValue('--safe-top');
                if (!safeTop || safeTop === '0px') {
                    if (CSS.supports('padding-top', 'env(safe-area-inset-top)')) {
                        document.documentElement.style.setProperty('--safe-top', 'env(safe-area-inset-top)');
                        document.documentElement.style.setProperty('--safe-bottom', 'env(safe-area-inset-bottom)');
                    }
                }
            }
            setSafeArea();
        })();

        var dangerCallback = null;
        window.showDangerConfirm = function(title, desc, callback) {
            document.getElementById('dangerTitle').textContent = title;
            document.getElementById('dangerDesc').textContent = desc;
            document.getElementById('dangerInput').value = '';
            document.getElementById('dangerConfirmBtn').classList.remove('active');
            dangerCallback = callback;
            document.getElementById('dangerConfirmOverlay').classList.add('show');
            setTimeout(function() { document.getElementById('dangerInput').focus(); }, 200);
        };
        window.closeDangerConfirm = function() {
            document.getElementById('dangerConfirmOverlay').classList.remove('show'); dangerCallback = null;
        };
        window.executeDangerAction = function() {
            if (dangerCallback) { dangerCallback(); } closeDangerConfirm();
        };
        document.getElementById('dangerInput').addEventListener('input', function() {
            var btn = document.getElementById('dangerConfirmBtn');
            if (this.value === '确认清空') { btn.classList.add('active'); } else { btn.classList.remove('active'); }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                var swPath = 'sw.js'; var path = window.location.pathname;
                if (path.lastIndexOf('/') > 0) { swPath = path.substring(0, path.lastIndexOf('/')+1) + 'sw.js'; }
                navigator.serviceWorker.register(swPath, { scope: './' }).catch(function() {});
            });
        }

        function hardUpdate() {
            var toast = document.getElementById('updateToast'); toast.classList.add('show'); toast.textContent = '正在更新...';
            if (navigator.serviceWorker) {
                navigator.serviceWorker.getRegistration().then(function(reg) {
                    if (reg && reg.waiting) {
                        reg.waiting.postMessage('skip-waiting');
                        navigator.serviceWorker.addEventListener('message', function handler(e) {
                            if (e.data === 'reload') { navigator.serviceWorker.removeEventListener('message', handler); window.location.reload(); }
                        });
                    } else if (reg) { reg.update().then(function() { setTimeout(function() { if (reg.waiting) reg.waiting.postMessage('skip-waiting'); setTimeout(function() { window.location.reload(); }, 2000); }, 500); }).catch(function() { window.location.reload(); }); } else { window.location.reload(); }
                }).catch(function() { window.location.reload(); });
            } else { window.location.reload(); }
        }

        function showToast(msg) { var t = document.getElementById('updateToast'); t.classList.add('show'); t.textContent = msg; setTimeout(function() { t.classList.remove('show'); }, 2000); }

        function applyTheme(theme) { document.body.classList.remove('theme-night','theme-eye'); if (theme==='night') document.body.classList.add('theme-night'); if (theme==='eye') document.body.classList.add('theme-eye'); var btns = document.querySelectorAll('.theme-btn'); for (var i=0; i<btns.length; i++) { btns[i].classList.toggle('active', btns[i].dataset.theme===theme); } }
        window.setTheme = function(t) { theme = t; applyTheme(t); };

        function applyFontSize(size) { document.documentElement.style.setProperty('--fs', size+'px'); }
        function applyOptGap(gap) { document.documentElement.style.setProperty('--opt-gap', gap+'px'); document.documentElement.style.setProperty('--opt-pad', (gap+4)+'px'); }

        var banks={}, currentBankName='', wrongInfo={}, favSet=new Set();
        var currentTab='practice', currentPage='home', currentMode=null, currentQuestions=[], currentIndex=0;
        var selectedOptions=new Set(), feedbackInfo=null, savedProgress={};
        var pendingRows=null, pendingFileName='', pendingHeaders=[];
        var questionStatus=[], randomCount=50, autoSkip=true, autoRemoveWrongCount=1;
        var hideDone=false, theme='day', fontSize=15, optGap=8;
        var FOOTER = '<div class="footer">苟富贵勿相忘，且用且珍惜。<br>作者：云映明川</div>';
        var FIELDS = ['忽略','知识类型（题目标签）','题型','题干','答案','解析','选项A','选项B','选项C','选项D','选项E','选项F','选项G'];

        // 考试配置相关变量
        var examGroupInfo = null; // { single: [], multi: [], judge: [] } 存储全局索引或题目对象

        function setToArray(s) { var arr=[]; s.forEach(function(v){ arr.push(v); }); return arr; }

        function migrateProgress() {
            var updated=false;
            for (var bn in savedProgress) {
                var val = savedProgress[bn];
                if (val && typeof val==='object' && typeof val.mode==='string') {
                    var mode = val.mode;
                    var newVal = {};
                    newVal[mode] = { questionIds: val.questionIds||[], index: val.index||0, status: val.status||[] };
                    savedProgress[bn] = newVal;
                    updated = true;
                }
            }
            if (updated) { localStorage.setItem('quizProgress', JSON.stringify(savedProgress)); }
        }

        function loadData() {
            try { banks = JSON.parse(localStorage.getItem('quizBanks')||'{}'); } catch(e) {}
            try { wrongInfo = JSON.parse(localStorage.getItem('wrongInfo')||'{}'); } catch(e) {}
            try { favSet = new Set(JSON.parse(localStorage.getItem('favSet')||'[]')); } catch(e) {}
            try { savedProgress = JSON.parse(localStorage.getItem('quizProgress')||'{}'); } catch(e) {}
            migrateProgress();
            try { var s = JSON.parse(localStorage.getItem('appSettings')||'{}');
                randomCount = s.randomCount||50; autoSkip = s.autoSkip!==false; autoRemoveWrongCount = s.autoRemoveWrongCount||1;
                hideDone = s.hideDone||false; theme = s.theme||'day'; fontSize = s.fontSize||15; optGap = s.optGap||8;
            } catch(e) {}
            applyTheme(theme); applyFontSize(fontSize); applyOptGap(optGap);
            var names = Object.keys(banks);
            if (names.length>0) {
                var lastName = localStorage.getItem('lastBankName');
                if (lastName && banks[lastName]) { currentBankName = lastName; } else { currentBankName = names[0]; }
            }
        }

        function saveAll() {
            localStorage.setItem('quizBanks', JSON.stringify(banks));
            localStorage.setItem('wrongInfo', JSON.stringify(wrongInfo));
            localStorage.setItem('favSet', JSON.stringify(setToArray(favSet)));
            saveProgress();
        }

        function saveProgress() {
            if (currentBankName && currentMode && currentQuestions.length>0) {
                if (!savedProgress[currentBankName]) { savedProgress[currentBankName] = {}; }
                savedProgress[currentBankName][currentMode] = {
                    questionIds: currentQuestions.map(function(q){ return q.id; }),
                    index: currentIndex,
                    status: questionStatus
                };
            }
            localStorage.setItem('quizProgress', JSON.stringify(savedProgress));
        }

        function restoreProgress(bn, mode) {
            var bankProgress = savedProgress[bn];
            if (!bankProgress) return false;
            var p = bankProgress[mode];
            if (!p || !p.questionIds || p.questionIds.length===0) return false;
            var pool = banks[bn] ? banks[bn].questions : [], qm={};
            for (var i=0; i<pool.length; i++) { qm[pool[i].id] = pool[i]; }
            currentQuestions = p.questionIds.map(function(id){ return qm[id]; }).filter(Boolean);
            if (currentQuestions.length===0) { delete bankProgress[mode]; saveProgress(); return false; }
            currentIndex = Math.min(p.index, currentQuestions.length-1);
            questionStatus = p.status || currentQuestions.map(function(){ return {answered:false, correct:false}; });
            selectedOptions.clear(); feedbackInfo = null;
            return true;
        }

        function findQ(id) { for (var bn in banks) { var qs = banks[bn].questions; for (var i=0; i<qs.length; i++) { if (qs[i].id==id) return qs[i]; } } return null; }

        function getModeLabel(mode) {
            var labels = { 'sequence':'顺序练习','random':'随机练习','exam':'考试模式','wrong':'错题练习','fav':'收藏练习',
                'judge_true':'判断·对','judge_false':'判断·错','single_choice':'单选题','multi_choice':'多选题',
                'judge':'判断题','multi_not_all':'多选·不全选','memorize_seq':'顺序背题','memorize_random':'随机背题',
                'memorize_single':'只背单选','memorize_multi':'只背多选','memorize_judge':'只背判断',
                'memorize_judge_true':'背题·判断对','memorize_judge_false':'背题·判断错','memorize_multi_not_all':'背题·多选不全选' };
            return labels[mode] || mode;
        }

        window.adjustFontSize = function(delta) { var input=document.getElementById('settingsFontSize'); var display=document.getElementById('fontSizeDisplay'); if (!input||!display) return; var val=parseInt(input.value)+delta; val=Math.max(13,Math.min(22,val)); input.value=val; display.textContent=val+'px'; applyFontSize(val); };
        window.resetFontSize = function() { var input=document.getElementById('settingsFontSize'); var display=document.getElementById('fontSizeDisplay'); if (!input||!display) return; input.value=15; display.textContent='15px'; applyFontSize(15); };
        window.adjustOptGap = function(delta) { var input=document.getElementById('settingsOptGap'); var display=document.getElementById('optGapDisplay'); if (!input||!display) return; var val=parseInt(input.value)+delta; val=Math.max(4,Math.min(20,val)); input.value=val; display.textContent=val+'px'; applyOptGap(val); };
        window.resetOptGap = function() { var input=document.getElementById('settingsOptGap'); var display=document.getElementById('optGapDisplay'); if (!input||!display) return; input.value=8; display.textContent='8px'; applyOptGap(8); };

        window.restartCurrentMode = function() {
            if (!currentBankName || !currentMode) return;
            if (currentMode === 'exam') {
                showExamConfig(); return;
            }
            if (!confirm('确定重新开始当前模式吗？这将清除当前进度。')) return;
            if (savedProgress[currentBankName] && savedProgress[currentBankName][currentMode]) {
                delete savedProgress[currentBankName][currentMode];
            }
            var mode = currentMode;
            currentMode = null; currentQuestions = []; selectedOptions.clear(); feedbackInfo = null;
            saveProgress();
            startMode(mode);
        };

        (function bindSliderEvents() {
            function bind() {
                var fontSizeSlider = document.getElementById('settingsFontSize');
                if (fontSizeSlider) { fontSizeSlider.addEventListener('input', function() { var display=document.getElementById('fontSizeDisplay'); if (display) display.textContent = this.value+'px'; applyFontSize(parseInt(this.value)); }); }
                var optGapSlider = document.getElementById('settingsOptGap');
                if (optGapSlider) { optGapSlider.addEventListener('input', function() { var display=document.getElementById('optGapDisplay'); if (display) display.textContent = this.value+'px'; applyOptGap(parseInt(this.value)); }); }
            }
            if (document.readyState==='loading') { document.addEventListener('DOMContentLoaded', bind); } else { bind(); }
        })();

        function saveSettings() {
            var fontSizeInput = document.getElementById('settingsFontSize'); var optGapInput = document.getElementById('settingsOptGap');
            randomCount = parseInt(document.getElementById('settingsRandomCount').value);
            autoRemoveWrongCount = parseInt(document.getElementById('settingsAutoRemoveCount').value);
            hideDone = document.getElementById('settingsHideDone').checked;
            fontSize = fontSizeInput ? parseInt(fontSizeInput.value) : 15;
            optGap = optGapInput ? parseInt(optGapInput.value) : 8;
            if (isNaN(randomCount)||randomCount<1) randomCount=50;
            if (isNaN(autoRemoveWrongCount)||autoRemoveWrongCount<0) autoRemoveWrongCount=1;
            if (isNaN(fontSize)||fontSize<13) fontSize=15;
            if (isNaN(optGap)||optGap<4) optGap=8;
            localStorage.setItem('appSettings', JSON.stringify({ randomCount:randomCount, autoSkip:autoSkip, autoRemoveWrongCount:autoRemoveWrongCount, hideDone:hideDone, theme:theme, fontSize:fontSize, optGap:optGap }));
            applyTheme(theme); applyFontSize(fontSize); applyOptGap(optGap);
            document.getElementById('settingsModal').classList.remove('show'); document.body.style.overflow = '';
            showToast('设置已保存');
        }

        function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); document.body.style.overflow = ''; }

        window.openSettings = function() {
            document.getElementById('settingsRandomCount').value = randomCount;
            document.getElementById('settingsAutoRemoveCount').value = autoRemoveWrongCount;
            document.getElementById('settingsHideDone').checked = hideDone;
            document.getElementById('settingsFontSize').value = fontSize;
            document.getElementById('settingsOptGap').value = optGap;
            var fontSizeDisplay = document.getElementById('fontSizeDisplay'); if (fontSizeDisplay) fontSizeDisplay.textContent = fontSize+'px';
            var optGapDisplay = document.getElementById('optGapDisplay'); if (optGapDisplay) optGapDisplay.textContent = optGap+'px';
            applyTheme(theme);
            document.getElementById('settingsModal').classList.add('show'); document.body.style.overflow = 'hidden';
        };
        window.switchTab = function(tab) { currentTab = tab; if (tab==='practice') currentPage='home'; else currentPage='manage'; document.getElementById('tabPracticeBtn').classList.toggle('active', tab==='practice'); document.getElementById('tabManageBtn').classList.toggle('active', tab==='manage'); render(); };
        window.goHome = function() { currentPage='home'; render(); };
        window.goPage = function(page) { currentPage = page; window.scrollTo(0,0); render(); };
        window.toggleAutoSkip = function(cb) { autoSkip = cb.checked; saveAll(); };

        window.importFile = function(file) {
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) { setTimeout(function() { try { var data = new Uint8Array(e.target.result); var wb = XLSX.read(data,{type:'array'}); var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}); if (rows.length<2) { alert('文件内容太少'); return; } pendingRows = rows; pendingFileName = file.name; showHeaderSelection(); } catch(err) { alert('文件读取失败，请检查文件格式'); } }, 50); };
            reader.onerror = function() { alert('文件读取失败'); };
            reader.readAsArrayBuffer(file);
        };

        function showHeaderSelection() {
            var c = document.getElementById('mappingList'), h = '<div class="import-help">请在下方预览中填写表头在第几行（如第1行是注意事项，表头在第2行则填2）</div>';
            h += '<table style="width:100%;border-collapse:collapse;font-size:12px"><tr><th>行号</th><th>内容预览</th></tr>';
            for (var r=0; r<Math.min(10,pendingRows.length); r++) { h += '<tr><td style="font-weight:bold;color:var(--primary)">第'+(r+1)+'行</td><td>'; var cells = pendingRows[r]||[]; for (var c2=0; c2<Math.min(8,cells.length); c2++) { h += '<span style="background:var(--input-bg);padding:2px 6px;border-radius:4px;margin:2px;display:inline-block;font-size:11px">'+(cells[c2]||'').toString().substring(0,15)+'</span>'; } h += '</td></tr>'; }
            h += '</table><label style="display:block;margin-top:12px;color:var(--text2)">表头在第几行？</label><input type="number" id="headerRowNum" min="1" value="1" step="1" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:16px">';
            c.innerHTML = h;
            document.getElementById('modalConfirmBtn').textContent = '下一步：列映射';
            document.getElementById('modalConfirmBtn').onclick = confirmHeaderAndShowMapping;
            document.getElementById('mappingModal').classList.add('show');
        }
        window.confirmHeaderAndShowMapping = function() {
            var n = parseInt(document.getElementById('headerRowNum').value); if (isNaN(n)||n<1||n>pendingRows.length) { alert('请输入有效行号'); return; }
            pendingHeaders = pendingRows[n-1].map(function(h){ return String(h||'').trim(); });
            pendingRows = pendingRows.slice(n);
            showMappingUI();
        };

        function autoGuess(col) { var t = col.trim(), l = t.toLowerCase(); if (/^[a-g]$/i.test(t)) return '选项'+t.toUpperCase(); var m = l.match(/^选项\s*([a-g])$/); if (m) return '选项'+m[1].toUpperCase(); m = l.match(/^([a-g])\s*选项$/); if (m) return '选项'+m[1].toUpperCase(); if (/知识|类别|章|节|模块|分类|标签/.test(l)) return '知识类型（题目标签）'; if (/题型|类型/.test(l)) return '题型'; if (/题干|题目|问题|内容/.test(l)) return '题干'; if (/答案|正确/.test(l)) return '答案'; if (/解析|解释/.test(l)) return '解析'; return '忽略'; }

        function showMappingUI() {
            var c = document.getElementById('mappingList'), h = '<div class="import-help"><strong>导入说明：</strong><br>必须映射：题型、题干、知识类型（题目标签）、答案<br>选项A-G建议映射，其他列选"忽略"<br>确认无误后点"确认导入"</div>';
            h += '<p style="color:var(--text2);margin-bottom:10px">请为每列选择对应含义：</p>';
            for (var i=0; i<pendingHeaders.length; i++) { var col = pendingHeaders[i], g = autoGuess(col); h += '<div class="mapping-row"><span style="flex:1;word-break:break-all">'+col+'</span><select id="mapSelect_'+i+'" style="width:130px;font-size:16px">'; for (var j=0; j<FIELDS.length; j++) { h += '<option value="'+FIELDS[j]+'"'+(FIELDS[j]===g?' selected':'')+'>'+FIELDS[j]+'</option>'; } h += '</select></div>'; }
            c.innerHTML = h;
            document.getElementById('modalConfirmBtn').textContent = '确认导入';
            document.getElementById('modalConfirmBtn').onclick = applyMapping;
        }
        window.applyMapping = function() {
            var mapping={}, hq=false, ha=false;
            for (var i=0; i<pendingHeaders.length; i++) { var sel = document.getElementById('mapSelect_'+i); if (!sel) continue; var f = sel.value; if (f==='忽略') continue; mapping[f]=i; if (f==='题干') hq=true; if (f==='答案') ha=true; }
            if (!hq || !ha) { alert('必须指定"题干"和"答案"！'); return; }
            document.getElementById('mappingModal').classList.remove('show'); document.body.style.overflow = '';
            var qs = [];
            for (var r=0; r<pendingRows.length; r++) { var row = pendingRows[r]; if (!row) continue; var qt = String(row[mapping['题干']]||'').trim(); if (!qt) continue; var ans = String(row[mapping['答案']]||'').trim().toUpperCase().replace(/,/g,'').replace(/，/g,'').replace(/\s/g,''); var tp = (mapping['题型']!==undefined) ? String(row[mapping['题型']]||'').trim() : ''; if (!tp || ['单选题','多选题','判断题'].indexOf(tp)<0) { if (ans==='正确'||ans==='错误'||ans==='对'||ans==='错') tp='判断题'; else if (ans.length>1 && /^[A-G]+$/.test(ans)) tp='多选题'; else tp='单选题'; } if (tp==='判断题') { if (ans==='A'||ans==='对') ans='正确'; else if (ans==='B'||ans==='错') ans='错误'; } var opts={}; for (var k in mapping) { if (k.indexOf('选项')===0) opts[k.replace('选项','')] = String(row[mapping[k]]||'').trim(); } qs.push({ id:0, '知识类型': mapping['知识类型（题目标签）']!==undefined ? String(row[mapping['知识类型（题目标签）']]||'').trim() : '', 题型:tp, 题干:qt, 答案:ans, 解析: mapping['解析']!==undefined ? String(row[mapping['解析']]||'').trim() : '', 选项:opts }); }
            var mid=0; for (var bn2 in banks) { var bq = banks[bn2].questions; for (var qi=0; qi<bq.length; qi++) { if (bq[qi].id>mid) mid=bq[qi].id; } } for (var qi2=0; qi2<qs.length; qi2++) { mid++; qs[qi2].id=mid; }
            var bn = pendingFileName.replace(/\.(xlsx|xls)$/i,''); banks[bn] = { questions:qs, fileName:pendingFileName }; if (!currentBankName) currentBankName = bn;
            saveAll(); pendingRows=null; pendingHeaders=[]; currentTab='practice'; currentPage='home';
            document.getElementById('tabPracticeBtn').classList.add('active'); document.getElementById('tabManageBtn').classList.remove('active');
            render(); showToast('成功导入 '+qs.length+' 题');
        };

        // 考试配置相关函数
        function showExamConfig() {

            var wrongSingle = Object.keys(wrongInfo).filter(function(id){ var q=findQ(id); return q && q['题型']==='单选题'; }).length;
            var wrongMulti = Object.keys(wrongInfo).filter(function(id){ var q=findQ(id); return q && q['题型']==='多选题'; }).length;

            h += '<div class="exam-config-hint">选题优先级</div>';
            h += '<div class="exam-priority-row"><button class="exam-priority-btn active" id="examPriorityNone" onclick="setExamPriority(\'none\')">无优先</button><button class="exam-priority-btn" id="examPriorityWrong" onclick="setExamPriority(\'wrong\')">错题优先</button><button class="exam-priority-btn" id="examPriorityUndone" onclick="setExamPriority(\'undone\')">未做优先</button></div>';

        window.setExamPriority = function(pri) {
            window._examPriority = pri;
            var btns = document.querySelectorAll('.exam-priority-btn');
            for (var i=0; i<btns.length; i++) { btns[i].classList.toggle('active', btns[i].id === 'examPriority'+pri.charAt(0).toUpperCase()+pri.slice(1)); }
        };

        window.startExamWithConfig = function() {
            var singleCnt = parseInt(document.getElementById('examSingleCount').value)||0;
            var multiCnt = parseInt(document.getElementById('examMultiCount').value)||0;
            var judgeCnt = parseInt(document.getElementById('examJudgeCount').value)||0;
            if (singleCnt+multiCnt+judgeCnt === 0) { alert('请至少选择一个题型'); return; }
            var pool = banks[currentBankName].questions;
            // 按题型分组
            var singles = pool.filter(function(q){ return q['题型']==='单选题'; });
            var multis = pool.filter(function(q){ return q['题型']==='多选题'; });
            var judges = pool.filter(function(q){ return q['题型']==='判断题'; });

            function applyPriority(arr, count) {
                if (count <= 0 || arr.length === 0) return [];
                var selected = [];
                var remaining = arr.slice();
                if (window._examPriority === 'wrong') {
                    // 错题优先：先取错题，再随机补充
                    var wrongIds = Object.keys(wrongInfo);
                    var wrongQs = remaining.filter(function(q){ return wrongIds.indexOf(String(q.id))!==-1; });
                    var normalQs = remaining.filter(function(q){ return wrongIds.indexOf(String(q.id))===-1; });
                    // 随机打乱
                    wrongQs.sort(function(){ return Math.random()-0.5; });
                    normalQs.sort(function(){ return Math.random()-0.5; });
                    selected = wrongQs.concat(normalQs).slice(0, count);
                } else if (window._examPriority === 'undone') {
                    // 未做优先：排除所有进度中已答对的题目
                    var doneMap = {};
                    var bankProgress = savedProgress[currentBankName];
                    if (bankProgress) {
                        for (var m in bankProgress) {
                            if (bankProgress[m] && bankProgress[m].status) {
                                bankProgress[m].status.forEach(function(s, i){ if (s && s.answered && s.correct) { var qid = bankProgress[m].questionIds[i]; if (qid) doneMap[qid]=true; } });
                            }
                        }
                    }
                    var undone = remaining.filter(function(q){ return !doneMap[q.id]; });
                    var done = remaining.filter(function(q){ return doneMap[q.id]; });
                    undone.sort(function(){ return Math.random()-0.5; });
                    done.sort(function(){ return Math.random()-0.5; });
                    selected = undone.concat(done).slice(0, count);
                } else {
                    // 无优先：随机
                    remaining.sort(function(){ return Math.random()-0.5; });
                    selected = remaining.slice(0, count);
                }
                return selected;
            }

            var selectedSingle = applyPriority(singles, Math.min(singleCnt, singles.length));
            var selectedMulti = applyPriority(multis, Math.min(multiCnt, multis.length));
            var selectedJudge = applyPriority(judges, Math.min(judgeCnt, judges.length));

            currentQuestions = selectedSingle.concat(selectedMulti, selectedJudge);
            if (currentQuestions.length === 0) { alert('没有符合条件的题目'); return; }

            // 存储分组信息用于答题卡
            examGroupInfo = {
                single: selectedSingle,
                multi: selectedMulti,
                judge: selectedJudge
            };

            currentMode = 'exam';
            currentIndex = 0;
            selectedOptions.clear();
            feedbackInfo = null;
            questionStatus = currentQuestions.map(function(){ return {answered:false, correct:false}; });
            // 考试模式不保存进度（或可选择性保存？这里不保存）
            currentPage = 'quiz';
            closeExamConfig();
            render();
        };

        window.startMode = function(mode) {
            if (!currentBankName || !banks[currentBankName]) return;
            if (mode === 'exam') {
                showExamConfig();
                return;
            }
            var pool = banks[currentBankName].questions;
            if (currentMode && currentQuestions.length>0) { saveProgress(); }
            currentMode = mode; selectedOptions.clear(); feedbackInfo = null; currentIndex = 0; questionStatus = [];
            if (restoreProgress(currentBankName, mode)) { examGroupInfo = null; currentPage='quiz'; render(); return; }
            examGroupInfo = null;
            if (mode==='wrong') currentQuestions = Object.keys(wrongInfo).filter(function(id){ return wrongInfo[id]; }).map(function(id){ return findQ(id); }).filter(Boolean);
            else if (mode==='fav') currentQuestions = setToArray(favSet).map(function(id){ return findQ(id); }).filter(Boolean);
            else if (mode==='judge_true') currentQuestions = pool.filter(function(q){ return q['题型']==='判断题' && q['答案']==='正确'; });
            else if (mode==='judge_false') currentQuestions = pool.filter(function(q){ return q['题型']==='判断题' && q['答案']==='错误'; });
            else if (mode==='multi_not_all') { currentQuestions = pool.filter(function(q){ if (q['题型']!=='多选题') return false; var allKeys = Object.keys(q['选项']).filter(function(k){ return q['选项'][k]; }); return q['答案'].split('').length < allKeys.length; }); }
            else if (mode==='random' || mode==='memorize_random') { var cnt = Math.min(randomCount, pool.length); currentQuestions = [].concat(pool).sort(function(){ return Math.random()-0.5; }).slice(0,cnt); }
            else if (mode==='sequence') currentQuestions = [].concat(pool);
            else if (mode==='single_choice') currentQuestions = pool.filter(function(q){ return q['题型']==='单选题'; });
            else if (mode==='multi_choice') currentQuestions = pool.filter(function(q){ return q['题型']==='多选题'; });
            else if (mode==='judge') currentQuestions = pool.filter(function(q){ return q['题型']==='判断题'; });
            else if (mode==='memorize_seq') currentQuestions = [].concat(pool);
            else if (mode==='memorize_single') currentQuestions = pool.filter(function(q){ return q['题型']==='单选题'; });
            else if (mode==='memorize_multi') currentQuestions = pool.filter(function(q){ return q['题型']==='多选题'; });
            else if (mode==='memorize_judge') currentQuestions = pool.filter(function(q){ return q['题型']==='判断题'; });
            else if (mode==='memorize_judge_true') currentQuestions = pool.filter(function(q){ return q['题型']==='判断题' && q['答案']==='正确'; });
            else if (mode==='memorize_judge_false') currentQuestions = pool.filter(function(q){ return q['题型']==='判断题' && q['答案']==='错误'; });
            else if (mode==='memorize_multi_not_all') { currentQuestions = pool.filter(function(q){ if (q['题型']!=='多选题') return false; var allKeys = Object.keys(q['选项']).filter(function(k){ return q['选项'][k]; }); return q['答案'].split('').length < allKeys.length; }); }
            if (hideDone && (mode==='sequence'||mode==='random')) {
                var bankProgress = savedProgress[currentBankName];
                if (bankProgress) {
                    var doneMap = {};
                    for (var m in bankProgress) {
                        if (bankProgress[m] && bankProgress[m].status) {
                            bankProgress[m].status.forEach(function(s, i){ if (s && s.answered && s.correct) { var qid = bankProgress[m].questionIds[i]; if (qid) doneMap[qid]=true; } });
                        }
                    }
                    currentQuestions = currentQuestions.filter(function(q){ return !doneMap[q.id]; });
                }
            }
            if (currentQuestions.length===0) { alert('没有符合条件的题目'); currentMode=null; return; }
            questionStatus = currentQuestions.map(function(){ return {answered:false, correct:false}; });
            saveProgress(); currentPage='quiz'; render();
        };

        window.submitAnswer = function() { if (!currentQuestions.length||currentIndex>=currentQuestions.length) return; var q = currentQuestions[currentIndex]; var selectedArr = setToArray(selectedOptions); var ua = q['题型']==='多选题'?selectedArr.sort().join(''):(selectedArr[0]||''); if (!ua) { alert('请选择答案'); return; } var ok; if (q['题型']==='判断题') { var uaText = ua==='A'?'正确':(ua==='B'?'错误':''); ok = uaText===q['答案']; } else { ok = ua.toUpperCase()===q['答案'].toUpperCase(); } feedbackInfo = { correct:ok, message:ok?'正确！':'错误！正确答案：'+q['答案']+(q['解析']?'<br>解析：'+q['解析']:'') }; if (!ok) { var info = wrongInfo[q.id]||{count:0,lastDate:'',dates:[],correctStreak:0}; info.count = (info.count||0)+1; info.lastDate = new Date().toISOString().slice(0,10); info.dates.push(info.lastDate); if (info.dates.length>20) info.dates = info.dates.slice(-20); info.correctStreak=0; wrongInfo[q.id]=info; } else { if (wrongInfo[q.id]) { wrongInfo[q.id].correctStreak = (wrongInfo[q.id].correctStreak||0)+1; if (autoRemoveWrongCount>0 && wrongInfo[q.id].correctStreak>=autoRemoveWrongCount) delete wrongInfo[q.id]; } } if (questionStatus[currentIndex]) { questionStatus[currentIndex].answered=true; questionStatus[currentIndex].correct=ok; } saveAll(); render(); if (ok && autoSkip && currentIndex<currentQuestions.length-1) setTimeout(function(){ currentIndex++; selectedOptions.clear(); feedbackInfo=null; saveProgress(); render(); },800); };
        window.nextQuestion = function() { if (currentIndex<currentQuestions.length-1) { currentIndex++; selectedOptions.clear(); feedbackInfo=null; saveProgress(); render(); } else alert('已是最后一题'); };
        window.prevQuestion = function() { if (currentIndex>0) { currentIndex--; selectedOptions.clear(); feedbackInfo=null; saveProgress(); render(); } };
        window.toggleOption = function(l,t) { if (t==='single') { selectedOptions.clear(); selectedOptions.add(l); } else selectedOptions.has(l)?selectedOptions.delete(l):selectedOptions.add(l); render(); };
        window.toggleFav = function() { var q = currentQuestions[currentIndex]; if (q) { favSet.has(q.id)?favSet.delete(q.id):favSet.add(q.id); saveAll(); render(); } };

        window.showAnswerSheet = function() {
            var modal = document.getElementById('answerSheetModal');
            var container = document.getElementById('answerSheetContent');
            var total = currentQuestions.length;
            document.getElementById('sheetTotal').textContent = total;
            var ac=0, cc=0;
            for (var i=0; i<total; i++) { var s = questionStatus[i]||{answered:false,correct:false}; if (s.answered) ac++; if (s.correct) cc++; }
            document.getElementById('sheetAnswered').textContent = ac;
            document.getElementById('sheetCorrect').textContent = cc;
            document.getElementById('sheetWrong').textContent = ac-cc;

            if (currentMode === 'exam' && examGroupInfo) {
                // 按题型分组显示
                var html = '';
                var types = [
                    { label: '单选题', key: 'single', color: '#3B82F6' },
                    { label: '多选题', key: 'multi', color: '#10B981' },
                    { label: '判断题', key: 'judge', color: '#F59E0B' }
                ];
                for (var t=0; t<types.length; t++) {
                    var group = examGroupInfo[types[t].key];
                    if (!group || group.length === 0) continue;
                    var groupAc = 0, groupCc = 0;
                    var cellsHtml = '';
                    for (var j=0; j<group.length; j++) {
                        var q = group[j];
                        // 找到该题在 currentQuestions 中的全局索引
                        var globalIdx = currentQuestions.indexOf(q);
                        if (globalIdx === -1) continue;
                        var status = questionStatus[globalIdx] || {answered:false, correct:false};
                        if (status.answered) groupAc++;
                        if (status.correct) groupCc++;
                        var cls = 'answer-cell';
                        if (globalIdx === currentIndex) cls += ' current';
                        else if (status.answered) cls += status.correct ? ' correct' : ' wrong';
                        cellsHtml += '<div class="'+cls+'" onclick="answerSheetJump('+globalIdx+')"><span>'+(globalIdx+1)+'</span></div>';
                    }
                    html += '<div style="margin-bottom:16px"><div style="font-weight:600; font-size:14px; margin-bottom:8px; color:'+types[t].color+'">'+types[t].label+' ('+groupAc+'/'+groupCc+' 对)</div><div class="answer-grid">'+cellsHtml+'</div></div>';
                }
                container.innerHTML = html;
            } else {
                // 普通网格
                var grid = document.createElement('div');
                grid.className = 'answer-grid';
                var gridHtml = '';
                for (var i=0; i<total; i++) {
                    var s = questionStatus[i]||{answered:false,correct:false};
                    var cls = 'answer-cell';
                    if (i === currentIndex) cls += ' current';
                    else if (s.answered) cls += s.correct ? ' correct' : ' wrong';
                    gridHtml += '<div class="'+cls+'" onclick="answerSheetJump('+i+')"><span>'+(i+1)+'</span></div>';
                }
                container.innerHTML = '<div class="answer-grid">'+gridHtml+'</div>';
            }
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        };
        window.answerSheetJump = function(idx) {
            currentIndex = idx; closeAnswerSheet(); render();
        };
        window.closeAnswerSheet = function() { document.getElementById('answerSheetModal').classList.remove('show'); document.body.style.overflow=''; };
        window.switchBank = function(name) { if (!name) return; if (currentMode && currentQuestions.length>0) { saveProgress(); } currentBankName=name; localStorage.setItem('lastBankName',name); currentMode=null; currentQuestions=[]; currentIndex=0; questionStatus=[]; selectedOptions.clear(); feedbackInfo=null; examGroupInfo=null; render(); };
        window.deleteBank = function(name) { if (confirm('删除题库"'+name+'"？')) { delete banks[name]; if (savedProgress[name]) { delete savedProgress[name]; saveProgress(); } saveAll(); if (currentBankName===name) { currentBankName=Object.keys(banks)[0]||''; localStorage.setItem('lastBankName',currentBankName); } render(); } };

        document.addEventListener('keydown', function(e) { if (currentPage!=='quiz'||!currentQuestions.length) return; if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return; if (e.key==='ArrowLeft') { e.preventDefault(); prevQuestion(); return; } if (e.key==='ArrowRight') { e.preventDefault(); nextQuestion(); return; } if (e.key==='Enter') { e.preventDefault(); submitAnswer(); return; } var num = parseInt(e.key); if (num>=1 && num<=7) { e.preventDefault(); var q = currentQuestions[currentIndex]; if (!q) return; var labels = Object.keys(q['选项']||{}).filter(function(k){ return q['选项'][k]; }); if (q['题型']==='判断题') labels=['A','B']; if (labels[num-1]) { toggleOption(labels[num-1], q['题型']==='多选题'?'multi':'single'); } } });
        document.addEventListener('touchmove', function(e){}, {passive:true});

        loadData();
        render();
    </script>
</body>
</html>
