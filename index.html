<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能刷题软件</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text2: #aaa;
            --success: #4e9f3d;
            --error: #e94560;
            --border: #2a2a4a;
            --input-bg: #1a1a30;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .nav {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        .nav-btn {
            background: var(--primary);
            color: var(--text);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        .nav-btn.active {
            background: var(--accent);
            color: white;
        }

        .main {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .bank-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .bank-tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text2);
            transition: 0.2s;
        }
        .bank-tag.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .question-type {
            font-size: 12px;
            color: var(--accent);
            background: rgba(233,69,96,0.15);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            margin-bottom: 8px;
            background: var(--input-bg);
            border-radius: var(--radius);
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: 0.2s;
            font-size: 15px;
        }
        .option-item:active {
            transform: scale(0.98);
        }
        .option-item.selected {
            border-color: var(--accent);
            background: rgba(233,69,96,0.1);
        }
        .option-item .letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }
        .option-item.selected .letter {
            background: var(--accent);
            color: white;
        }
        .option-item .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--text2);
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .option-item.selected .checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .btn:active { transform: scale(0.95); }
        .btn-submit { background: var(--accent); color: white; }
        .btn-nav { background: var(--primary); color: var(--text); flex: 0.5; }
        .btn-fav { flex: 0.3; background: transparent; border: 1.5px solid var(--border); color: var(--text2); }

        .analysis {
            padding: 12px;
            border-radius: var(--radius);
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
        .analysis.show { display: block; }
        .analysis.correct { background: rgba(78,159,61,0.15); color: var(--success); }
        .analysis.wrong { background: rgba(233,69,96,0.15); color: var(--error); }

        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text2);
            text-align: center;
            margin-bottom: 4px;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .mode-btn {
            padding: 12px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .mode-btn:active { background: var(--primary); }
        .mode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        .import-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .import-area:active { border-color: var(--accent); }
        .import-area input { display: none; }

        .status-bar {
            background: var(--card);
            padding: 8px 16px;
            text-align: center;
            font-size: 12px;
            color: var(--text2);
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius);
            background: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .cat-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 2px;
            color: var(--text2);
        }
        .cat-item:active { background: var(--primary); }
        .cat-item.selected { background: var(--accent); color: white; }

        .question-list-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-title">智能刷题</div>
        <div>
            <button class="nav-btn active" id="tabPracticeBtn" onclick="switchTab('practice')">刷题</button>
            <button class="nav-btn" id="tabManageBtn" onclick="switchTab('manage')" style="margin-left:4px;">题库</button>
        </div>
    </div>

    <div class="main" id="mainContent"></div>
    <div class="status-bar" id="statusBar">就绪</div>

    <script>
        // ==================== 全局数据 ====================
        let banks = {};
        let wrongSet = new Set();
        let favSet = new Set();
        let progress = {};
        let categories = new Set();

        let currentTab = 'practice';
        let currentMode = null;
        let currentQuestions = [];
        let currentIndex = 0;
        let selectedBanks = [];
        let selectedOptions = new Set();
        let selectedCat = null;

        // ==================== 初始化加载 ====================
        function loadData() {
            try {
                const saved = localStorage.getItem('quizBanks');
                if (saved) banks = JSON.parse(saved);
            } catch(e) { banks = {}; }
            try {
                const w = localStorage.getItem('wrongSet');
                if (w) wrongSet = new Set(JSON.parse(w));
            } catch(e) { wrongSet = new Set(); }
            try {
                const f = localStorage.getItem('favSet');
                if (f) favSet = new Set(JSON.parse(f));
            } catch(e) { favSet = new Set(); }
            try {
                const p = localStorage.getItem('progress');
                if (p) progress = JSON.parse(p);
            } catch(e) { progress = {}; }
        }

        function saveAll() {
            localStorage.setItem('quizBanks', JSON.stringify(banks));
            localStorage.setItem('wrongSet', JSON.stringify([...wrongSet]));
            localStorage.setItem('favSet', JSON.stringify([...favSet]));
            localStorage.setItem('progress', JSON.stringify(progress));
        }

        function setStatus(msg) {
            document.getElementById('statusBar').textContent = msg;
        }

        // ==================== 标签切换 ====================
        function switchTab(tab) {
            currentTab = tab;
            const pBtn = document.getElementById('tabPracticeBtn');
            const mBtn = document.getElementById('tabManageBtn');
            if (tab === 'practice') {
                pBtn.classList.add('active');
                mBtn.classList.remove('active');
            } else {
                mBtn.classList.add('active');
                pBtn.classList.remove('active');
            }
            render();
        }

        // ==================== 解析 Excel ====================
        function parseExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        if (rows.length < 2) {
                            reject('文件为空');
                            return;
                        }
                        const headers = rows[0].map(h => String(h || '').trim());
                        const questions = [];
                        const colMap = {};
                        for (let i = 0; i < headers.length; i++) {
                            const h = headers[i].toLowerCase();
                            if (h.includes('知识') || h.includes('类别') || h.includes('章') || h.includes('节')) colMap['知识类型'] = i;
                            else if (h.includes('题型') || h.includes('类型')) colMap['题型'] = i;
                            else if (h.includes('题干') || h.includes('题目') || h.includes('问题')) colMap['题干'] = i;
                            else if (h.includes('答案') || h.includes('正确')) colMap['答案'] = i;
                            else if (h.includes('解析') || h.includes('解释')) colMap['解析'] = i;
                            else if (/^[a-g]$/i.test(headers[i].trim())) colMap['选项' + headers[i].trim().toUpperCase()] = i;
                        }
                        if (!('题干' in colMap) || !('答案' in colMap)) {
                            reject('缺少题干或答案列。已识别列：' + JSON.stringify(Object.keys(colMap)));
                            return;
                        }
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || row.every(c => !c)) continue;
                            const qText = String(row[colMap['题干']] || '').trim();
                            if (!qText) continue;
                            let answer = String(row[colMap['答案']] || '').trim().toUpperCase()
                                .replace(/,/g, '').replace(/，/g, '').replace(/\s/g, '');
                            let qtype = String(row[colMap['题型']] || '').trim();
                            if (!qtype || !['单选题','多选题','判断题'].includes(qtype)) {
                                if (answer === '正确' || answer === '错误' || answer === '对' || answer === '错') qtype = '判断题';
                                else if (answer.length > 1 && /^[A-G]+$/.test(answer)) qtype = '多选题';
                                else qtype = '单选题';
                            }
                            if (qtype === '判断题') {
                                if (answer === 'A' || answer === '对') answer = '正确';
                                else if (answer === 'B' || answer === '错') answer = '错误';
                            }
                            const options = {};
                            for (let key in colMap) {
                                if (key.startsWith('选项')) {
                                    options[key.slice(2)] = String(row[colMap[key]] || '').trim();
                                }
                            }
                            questions.push({
                                id: null,
                                知识类型: String(row[colMap['知识类型']] || '').trim(),
                                题型: qtype,
                                题干: qText,
                                答案: answer,
                                解析: String(row[colMap['解析']] || '').trim(),
                                选项: options,
                                来源文件: file.name
                            });
                        }
                        resolve(questions);
                    } catch(err) {
                        reject('解析失败：' + err.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // ==================== 导入 ====================
        async function importBanks(files) {
            let totalImported = 0;
            for (const file of files) {
                try {
                    const questions = await parseExcel(file);
                    const maxId = Math.max(0, ...Object.values(banks).flatMap(qs => qs.map(q => q.id || 0)));
                    questions.forEach((q, i) => { q.id = maxId + i + 1; });
                    const bankName = file.name.replace(/\.(xlsx|xls)$/i, '');
                    banks[bankName] = questions;
                    totalImported += questions.length;
                } catch(err) {
                    alert(`导入 ${file.name} 失败：${err}`);
                }
            }
            saveAll();
            setStatus(`成功导入 ${totalImported} 道题目`);
            render();
        }

        // ==================== 渲染 ====================
        function render() {
            const main = document.getElementById('mainContent');
            if (currentTab === 'practice') {
                renderPractice(main);
            } else {
                renderManage(main);
            }
        }

        function renderPractice(main) {
            const bankNames = Object.keys(banks);
            let html = '';

            if (bankNames.length === 0) {
                html += `<div class="import-area" onclick="document.getElementById('fileInput').click()">
                    <div style="font-size:36px;margin-bottom:8px;">📁</div>
                    <div style="font-size:15px;color:#aaa;">点击导入题库 Excel 文件</div>
                    <div style="font-size:12px;color:#666;margin-top:4px;">支持 .xlsx 格式</div>
                    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple
                        onchange="importBanks(this.files);this.value=''">
                </div>`;
            } else {
                html += '<div class="card"><div class="card-title">选择题库（可多选）</div><div class="bank-list">';
                for (const name of bankNames) {
                    const sel = selectedBanks.includes(name) ? ' selected' : '';
                    html += `<div class="bank-tag${sel}" onclick="toggleBank('${name}')">${name}</div>`;
                }
                html += '</div>';

                html += '<div class="card-title" style="margin-top:8px;">练习模式</div>';
                html += '<div class="mode-grid">';
                const modes = [
                    { id: 'sequence', label: '📖 顺序练习' },
                    { id: 'random', label: '🔀 随机练习' },
                    { id: 'exam', label: '📝 模拟考试' },
                    { id: 'wrong', label: '❌ 错题重做' },
                    { id: 'fav', label: '⭐ 收藏练习' },
                ];
                for (const m of modes) {
                    const active = currentMode === m.id ? ' active' : '';
                    html += `<div class="mode-btn${active}" onclick="startMode('${m.id}')">${m.label}</div>`;
                }
                html += '</div></div>';

                if (currentMode && currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
                    const q = currentQuestions[currentIndex];
                    const total = currentQuestions.length;
                    const pct = ((currentIndex + 1) / total) * 100;

                    html += `<div class="progress-text">${currentIndex + 1} / ${total}</div>`;
                    html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

                    html += '<div class="card">';
                    html += `<div class="question-header"><span class="question-type">${q['题型']}</span>`;
                    html += `<span style="font-size:12px;color:#aaa;">${q['知识类型'] || ''}</span></div>`;
                    html += `<div class="question-text">${q['题干']}</div>`;

                    if (q['题型'] === '判断题') {
                        for (const opt of ['正确', '错误']) {
                            const sel = selectedOptions.has(opt) ? ' selected' : '';
                            html += `<div class="option-item${sel}" onclick="toggleOption('${opt}', 'single')">
                                <div class="letter">${opt[0]}</div>${opt}</div>`;
                        }
                    } else if (q['题型'] === '单选题') {
                        for (const [key, text] of Object.entries(q['选项'])) {
                            if (text) {
                                const sel = selectedOptions.has(key) ? ' selected' : '';
                                html += `<div class="option-item${sel}" onclick="toggleOption('${key}', 'single')">
                                    <div class="letter">${key}</div>${text}</div>`;
                            }
                        }
                    } else if (q['题型'] === '多选题') {
                        for (const [key, text] of Object.entries(q['选项'])) {
                            if (text) {
                                const sel = selectedOptions.has(key) ? ' selected' : '';
                                const check = sel ? '✓' : '';
                                html += `<div class="option-item${sel}" onclick="toggleOption('${key}', 'multi')">
                                    <div class="checkbox">${check}</div>${key}. ${text}</div>`;
                            }
                        }
                    }

                    html += '<div class="btn-row">';
                    html += `<button class="btn btn-nav" onclick="prevQuestion()">◀</button>`;
                    html += `<button class="btn btn-submit" onclick="submitAnswer()">提交</button>`;
                    html += `<button class="btn btn-nav" onclick="nextQuestion()">▶</button>`;
                    const isFav = favSet.has(q.id);
                    html += `<button class="btn btn-fav" onclick="toggleFav()" style="color:${isFav?'#e94560':'#aaa'}">${isFav ? '★' : '☆'}</button>`;
                    html += '</div>';

                    html += `<div class="analysis" id="analysisBox"></div>`;
                    html += '</div>';
                } else if (currentMode && currentQuestions.length === 0) {
                    html += '<div class="card" style="text-align:center;padding:40px;color:#aaa;">没有题目</div>';
                }
            }

            if (bankNames.length > 0) {
                html += `<div style="text-align:center;margin-top:8px;">
                    <button class="nav-btn" onclick="document.getElementById('fileInput2').click()">📥 导入更多题库</button>
                    <input type="file" id="fileInput2" accept=".xlsx,.xls" multiple
                        onchange="importBanks(this.files);this.value=''" style="display:none">
                </div>`;
            }

            main.innerHTML = html;
        }

        function renderManage(main) {
            const bankNames = Object.keys(banks);
            let html = '';

            if (bankNames.length === 0) {
                html += `<div class="import-area" onclick="document.getElementById('fileInputM').click()">
                    <div style="font-size:36px;margin-bottom:8px;">📁</div>
                    <div>点击导入题库</div>
                    <input type="file" id="fileInputM" accept=".xlsx,.xls" multiple
                        onchange="importBanks(this.files);this.value=''" style="display:none">
                </div>`;
            } else {
                html += '<div class="card"><div class="card-title">知识分类</div>';
                html += '<div id="catTree"></div></div>';

                html += '<div class="card">';
                html += '<select id="bankSelect" onchange="onBankChange()" style="margin-bottom:8px;">';
                for (const name of bankNames) {
                    html += `<option value="${name}">${name}</option>`;
                }
                html += '</select>';
                html += '<div id="questionList" style="max-height:300px;overflow-y:auto;"></div>';
                html += `<div class="btn-row" style="margin-top:8px;">
                    <button class="nav-btn" onclick="document.getElementById('fileInputM2').click()">📥 导入</button>
                    <button class="nav-btn" onclick="deleteBank()">🗑 删除题库</button>
                </div>`;
                html += '<input type="file" id="fileInputM2" accept=".xlsx,.xls" multiple
                    onchange="importBanks(this.files);this.value=''" style="display:none">';
                html += '</div>';
            }

            main.innerHTML = html;
            if (bankNames.length > 0) {
                renderCatTree();
                onBankChange();
            }
        }

        function renderCatTree() {
            const treeDiv = document.getElementById('catTree');
            if (!treeDiv) return;
            const bankSelect = document.getElementById('bankSelect');
            if (!bankSelect) return;
            const bankName = bankSelect.value;
            if (!bankName || !banks[bankName]) return;

            const qs = banks[bankName] || [];
            const cats = [...new Set(qs.map(q => q['知识类型']).filter(Boolean))];
            
            function buildTree(cats) {
                const tree = {};
                for (const cat of cats) {
                    const parts = cat.split('/');
                    let current = tree;
                    for (const part of parts) {
                        if (!current[part]) current[part] = {};
                        current = current[part];
                    }
                }
                return tree;
            }

            function renderTree(node, prefix = '') {
                let html = '';
                for (const [name, children] of Object.entries(node)) {
                    const path = prefix ? `${prefix}/${name}` : name;
                    const count = qs.filter(q => q['知识类型'] === path || (q['知识类型'] || '').startsWith(path + '/')).length;
                    const sel = selectedCat === path ? ' selected' : '';
                    html += `<div class="cat-item${sel}" onclick="selectCat('${path}')">📁 ${name} (${count})</div>`;
                    if (Object.keys(children).length > 0) {
                        html += `<div style="padding-left:16px;">${renderTree(children, path)}</div>`;
                    }
                }
                return html;
            }

            const tree = buildTree(cats);
            treeDiv.innerHTML = renderTree(tree) || '<div style="color:#aaa;padding:8px;">暂无分类</div>';
        }

        function selectCat(path) {
            selectedCat = (selectedCat === path) ? null : path;
            renderCatTree();
            onBankChange();
        }

        function onBankChange() {
            const bankSelect = document.getElementById('bankSelect');
            if (!bankSelect) return;
            const bankName = bankSelect.value;
            if (!bankName || !banks[bankName]) return;

            let qs = banks[bankName] || [];
            if (selectedCat) {
                qs = qs.filter(q => q['知识类型'] === selectedCat || (q['知识类型'] || '').startsWith(selectedCat + '/'));
            }

            const listDiv = document.getElementById('questionList');
            if (!listDiv) return;
            let html = '';
            for (const q of qs) {
                html += `<div class="question-list-item">
                    <span><span style="color:#e94560;">[${q['题型']}]</span> ${q['题干'].substring(0, 30)}...</span>
                    <span style="color:#aaa;font-size:12px;">${q['答案']}</span>
                </div>`;
            }
            listDiv.innerHTML = html || '<div style="color:#aaa;text-align:center;padding:20px;">无题目</div>';
        }

        function deleteBank() {
            const bankSelect = document.getElementById('bankSelect');
            if (!bankSelect) return;
            const bankName = bankSelect.value;
            if (!bankName) return;
            if (confirm(`确定删除题库「${bankName}」？`)) {
                delete banks[bankName];
                saveAll();
                setStatus(`已删除「${bankName}」`);
                selectedBanks = selectedBanks.filter(b => b !== bankName);
                currentMode = null;
                currentQuestions = [];
                render();
            }
        }

        // ==================== 刷题逻辑 ====================
        function toggleBank(name) {
            const idx = selectedBanks.indexOf(name);
            if (idx >= 0) selectedBanks.splice(idx, 1);
            else selectedBanks.push(name);
            render();
        }

        function startMode(mode) {
            if (selectedBanks.length === 0 && mode !== 'wrong' && mode !== 'fav') {
                setStatus('请先选择题库');
                return;
            }
            currentMode = mode;
            selectedOptions.clear();
            currentIndex = 0;

            if (mode === 'sequence') {
                currentQuestions = selectedBanks.flatMap(bn => banks[bn] || []);
            } else if (mode === 'random') {
                currentQuestions = selectedBanks.flatMap(bn => banks[bn] || []);
                // 打乱
                for (let i = currentQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
                }
            } else if (mode === 'wrong') {
                const wIds = [...wrongSet];
                currentQuestions = Object.values(banks).flat().filter(q => wIds.includes(q.id));
            } else if (mode === 'fav') {
                const fIds = [...favSet];
                currentQuestions = Object.values(banks).flat().filter(q => fIds.includes(q.id));
            } else if (mode === 'exam') {
                currentQuestions = selectedBanks.flatMap(bn => banks[bn] || []);
                // 随机抽取50题
                const count = Math.min(50, currentQuestions.length);
                for (let i = currentQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
                }
                currentQuestions = currentQuestions.slice(0, count);
            }

            document.getElementById('analysisBox')?.classList.remove('show', 'correct', 'wrong');
            render();
            setStatus(`加载 ${currentQuestions.length} 道题目`);
        }

        function toggleOption(val, type) {
            if (type === 'single') {
                selectedOptions.clear();
                selectedOptions.add(val);
            } else {
                if (selectedOptions.has(val)) selectedOptions.delete(val);
                else selectedOptions.add(val);
            }
            render();
        }

        function submitAnswer() {
            if (!currentQuestions.length || currentIndex >= currentQuestions.length) return;
            const q = currentQuestions[currentIndex];
            let userAns;
            if (q['题型'] === '多选题') {
                userAns = [...selectedOptions].sort().join('');
            } else {
                userAns = [...selectedOptions][0] || '';
            }
            if (!userAns) {
                setStatus('请选择答案');
                return;
            }
            const isCorrect = userAns.toUpperCase() === q['答案'].toUpperCase();
            const box = document.getElementById('analysisBox');
            if (box) {
                box.classList.add('show');
                if (isCorrect) {
                    box.classList.add('correct');
                    box.classList.remove('wrong');
                    box.innerHTML = '✓ 正确！';
                    setStatus('回答正确 ✓');
                } else {
                    box.classList.add('wrong');
                    box.classList.remove('correct');
                    box.innerHTML = `✗ 错误！正确答案：${q['答案']}<br>${q['解析'] || ''}`;
                    wrongSet.add(q.id);
                    setStatus('回答错误 ✗');
                }
            }
            saveAll();
            render();
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                selectedOptions.clear();
                document.getElementById('analysisBox')?.classList.remove('show', 'correct', 'wrong');
                render();
            } else {
                setStatus('已经是最后一题');
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                selectedOptions.clear();
                document.getElementById('analysisBox')?.classList.remove('show', 'correct', 'wrong');
                render();
            }
        }

        function toggleFav() {
            const q = currentQuestions[currentIndex];
            if (q) {
                if (favSet.has(q.id)) favSet.delete(q.id);
                else favSet.add(q.id);
                saveAll();
                render();
            }
        }

        // ==================== 初始化 ====================
        loadData();
        render();
    </script>
</body>
</html>
