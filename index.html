<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能刷题软件</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text2: #aaa;
            --success: #4e9f3d;
            --error: #e94560;
            --border: #2a2a4a;
            --input-bg: #1a1a30;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 顶部导航 */
        .nav {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        .nav-btn {
            background: var(--primary);
            color: var(--text);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* 主内容区 */
        .main {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 卡片 */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* 题库选择 */
        .bank-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .bank-tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text2);
            transition: 0.2s;
        }
        .bank-tag.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* 题目区 */
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .question-type {
            font-size: 12px;
            color: var(--accent);
            background: rgba(233,69,96,0.15);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            margin-bottom: 8px;
            background: var(--input-bg);
            border-radius: var(--radius);
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: 0.2s;
            font-size: 15px;
        }
        .option-item:active {
            transform: scale(0.98);
        }
        .option-item.selected {
            border-color: var(--accent);
            background: rgba(233,69,96,0.1);
        }
        .option-item .letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }
        .option-item.selected .letter {
            background: var(--accent);
            color: white;
        }
        .option-item .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--text2);
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .option-item.selected .checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .btn:active { transform: scale(0.95); }
        .btn-submit { background: var(--accent); color: white; }
        .btn-nav { background: var(--primary); color: var(--text); flex: 0.5; }
        .btn-fav { flex: 0.3; background: transparent; border: 1.5px solid var(--border); color: var(--text2); }

        /* 解析区 */
        .analysis {
            padding: 12px;
            border-radius: var(--radius);
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
        .analysis.show { display: block; }
        .analysis.correct { background: rgba(78,159,61,0.15); color: var(--success); }
        .analysis.wrong { background: rgba(233,69,96,0.15); color: var(--error); }

        /* 进度条 */
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text2);
            text-align: center;
            margin-bottom: 4px;
        }

        /* 模式选择 */
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .mode-btn {
            padding: 12px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .mode-btn:active { background: var(--primary); }
        .mode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* 导入区 */
        .import-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .import-area:active { border-color: var(--accent); }
        .import-area input { display: none; }

        /* 分类树 */
        .cat-tree {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        .cat-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }
        .cat-item:active { background: var(--primary); }
        .cat-item.selected { background: var(--accent); color: white; }
        .cat-item .expand-icon {
            font-size: 10px;
            transition: 0.2s;
            width: 16px;
            text-align: center;
        }
        .cat-item .expand-icon.open { transform: rotate(90deg); }
        .sub-cats { padding-left: 20px; display: none; }
        .sub-cats.open { display: block; }

        /* 底部状态栏 */
        .status-bar {
            background: var(--card);
            padding: 8px 16px;
            text-align: center;
            font-size: 12px;
            color: var(--text2);
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* 添加桌面提示 */
        .install-banner {
            background: var(--accent);
            color: white;
            padding: 10px 16px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="install-banner" id="installBanner" onclick="installApp()">
        📲 点击添加到手机桌面，像 App 一样使用
    </div>

    <!-- 顶部导航 -->
    <div class="nav">
        <div class="nav-title">智能刷题</div>
        <div>
            <button class="nav-btn" onclick="switchTab('practice')" id="tabPractice">刷题</button>
            <button class="nav-btn" onclick="switchTab('manage')" id="tabManage" style="margin-left:4px;">管理</button>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main" id="mainContent"></div>

    <!-- 状态栏 -->
    <div class="status-bar" id="statusBar">就绪</div>

    <script>
        // ==================== 全局数据 ====================
        let banks = JSON.parse(localStorage.getItem('quizBanks') || '{}');
        let wrongSet = new Set(JSON.parse(localStorage.getItem('wrongSet') || '[]'));
        let favSet = new Set(JSON.parse(localStorage.getItem('favSet') || '[]'));
        let progress = JSON.parse(localStorage.getItem('progress') || '{}');
        let categories = new Set(JSON.parse(localStorage.getItem('categories') || '[]'));

        let currentTab = 'practice';
        let currentMode = null;
        let currentQuestions = [];
        let currentIndex = 0;
        let selectedBanks = [];
        let examAnswers = {};
        let selectedCat = null;
        let selectedOptions = new Set();

        // ==================== 持久化 ====================
        function saveAll() {
            localStorage.setItem('quizBanks', JSON.stringify(banks));
            localStorage.setItem('wrongSet', JSON.stringify([...wrongSet]));
            localStorage.setItem('favSet', JSON.stringify([...favSet]));
            localStorage.setItem('progress', JSON.stringify(progress));
            localStorage.setItem('categories', JSON.stringify([...categories]));
        }

        function setStatus(msg) {
            document.getElementById('statusBar').textContent = msg;
        }

        // ==================== 标签切换 ====================
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabPractice').style.background = tab === 'practice' ? '#e94560' : '#0f3460';
            document.getElementById('tabManage').style.background = tab === 'manage' ? '#e94560' : '#0f3460';
            render();
        }

        // ==================== 解析 Excel 文件 ====================
        function parseExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        if (rows.length < 2) {
                            reject('文件为空或只有表头');
                            return;
                        }
                        const headers = rows[0].map(h => String(h || '').trim());
                        const questions = [];
                        // 自动识别列
                        const colMap = {};
                        for (let i = 0; i < headers.length; i++) {
                            const h = headers[i].toLowerCase();
                            if (h.includes('知识') || h.includes('类别') || h.includes('章') || h.includes('节')) colMap['知识类型'] = i;
                            else if (h.includes('题型') || h.includes('类型')) colMap['题型'] = i;
                            else if (h.includes('题干') || h.includes('题目') || h.includes('问题')) colMap['题干'] = i;
                            else if (h.includes('答案') || h.includes('正确')) colMap['答案'] = i;
                            else if (h.includes('解析') || h.includes('解释')) colMap['解析'] = i;
                            else if (/^[a-g]$/i.test(headers[i].trim())) colMap['选项' + headers[i].trim().toUpperCase()] = i;
                        }
                        if (!('题干' in colMap) || !('答案' in colMap)) {
                            reject('缺少题干或答案列，已识别列：' + JSON.stringify(colMap));
                            return;
                        }
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || row.every(c => !c)) continue;
                            const qText = String(row[colMap['题干']] || '').trim();
                            if (!qText) continue;
                            let answer = String(row[colMap['答案']] || '').trim().toUpperCase()
                                .replace(/,/g, '').replace(/，/g, '').replace(/\s/g, '');
                            let qtype = String(row[colMap['题型']] || '').trim();
                            if (!qtype || !['单选题','多选题','判断题'].includes(qtype)) {
                                if (answer === '正确' || answer === '错误' || answer === '对' || answer === '错') qtype = '判断题';
                                else if (answer.length > 1 && /^[A-G]+$/.test(answer)) qtype = '多选题';
                                else qtype = '单选题';
                            }
                            if (qtype === '判断题') {
                                if (answer === 'A' || answer === '对') answer = '正确';
                                else if (answer === 'B' || answer === '错') answer = '错误';
                            }
                            const options = {};
                            for (let key in colMap) {
                                if (key.startsWith('选项')) {
                                    const letter = key.slice(2);
                                    options[letter] = String(row[colMap[key]] || '').trim();
                                }
                            }
                            questions.push({
                                id: null,
                                知识类型: String(row[colMap['知识类型']] || '').trim(),
                                题型: qtype,
                                题干: qText,
                                答案: answer,
                                解析: String(row[colMap['解析']] || '').trim(),
                                选项: options,
                                来源文件: file.name
                            });
                        }
                        resolve(questions);
                    } catch(err) {
                        reject('解析失败：' + err.message);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        // ==================== 导入题库 ====================
        async function importBanks(files) {
            let totalImported = 0;
            for (const file of files) {
                try {
                    const questions = await parseExcel(file);
                    const maxId = Math.max(0, ...Object.values(banks).flatMap(qs => qs.map(q => q.id || 0)));
                    questions.forEach((q, i) => {
                        q.id = maxId + i + 1;
                        if (q.知识类型) categories.add(q.知识类型);
                    });
                    const bankName = file.name.replace(/\.(xlsx|xls)$/i, '');
                    banks[bankName] = questions;
                    totalImported += questions.length;
                } catch(err) {
                    alert(`导入 ${file.name} 失败：${err}`);
                }
            }
            saveAll();
            setStatus(`成功导入 ${totalImported} 道题目`);
            render();
        }

        // ==================== 渲染 ====================
        function render() {
            const main = document.getElementById('mainContent');
            if (currentTab === 'practice') {
                renderPractice(main);
            } else {
                renderManage(main);
            }
        }

        function renderPractice(main) {
            const bankNames = Object.keys(banks);
            let html = '';

            // 导入按钮（如果没有题库则显示大导入区）
            if (bankNames.length === 0) {
                html += `
                    <div class="import-area" onclick="document.getElementById('fileInput').click()">
                        <div style="font-size:36px;margin-bottom:8px;">📁</div>
                        <div style="font-size:15px;color:#aaa;">点击导入题库 Excel 文件</div>
                        <div style="font-size:12px;color:#666;margin-top:4px;">支持 .xlsx 格式</div>
                        <input type="file" id="fileInput" accept=".xlsx,.xls" multiple
                            onchange="importBanks(this.files);this.value=''">
                    </div>`;
            } else {
                // 题库选择
                html += '<div class="card"><div class="card-title">选择题库（可多选）</div><div class="bank-list">';
                for (const name of bankNames) {
                    const selected = selectedBanks.includes(name) ? ' selected' : '';
                    html += `<div class="bank-tag${selected}" onclick="toggleBank('${name}')">${name}</div>`;
                }
                html += '</div>';

                // 模式选择
                html += '<div class="card-title" style="margin-top:8px;">练习模式</div>';
                html += '<div class="mode-grid">';
                const modes = [
                    { id: 'sequence', label: '📖 顺序练习' },
                    { id: 'random', label: '🔀 随机练习' },
                    { id: 'exam', label: '📝 模拟考试' },
                    { id: 'wrong', label: '❌ 错题重做' },
                    { id: 'fav', label: '⭐ 收藏练习' },
                ];
                for (const m of modes) {
                    const active = currentMode === m.id ? ' active' : '';
                    html += `<div class="mode-btn${active}" onclick="startMode('${m.id}')">${m.label}</div>`;
                }
                html += '</div></div>';

                // 题目显示区
                if (currentMode && currentQuestions.length > 0 && currentIndex < currentQuestions.length) {
                    const q = currentQuestions[currentIndex];
                    const total = currentQuestions.length;
                    const pct = ((currentIndex + 1) / total) * 100;

                    html += `<div class="progress-text">${currentIndex + 1} / ${total}</div>`;
                    html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

                    html += '<div class="card">';
                    html += `<div class="question-header"><span class="question-type">${q['题型']}</span>`;
                    html += `<span style="font-size:12px;color:#aaa;">${q['知识类型'] || ''}</span></div>`;
                    html += `<div class="question-text">${q['题干']}</div>`;

                    // 选项
                    if (q['题型'] === '判断题') {
                        for (const opt of ['正确', '错误']) {
                            const sel = selectedOptions.has(opt) ? ' selected' : '';
                            html += `<div class="option-item${sel}" onclick="toggleOption('${opt}', 'single')">
                                <div class="letter">${opt[0]}</div>${opt}</div>`;
                        }
                    } else if (q['题型'] === '单选题') {
                        for (const [key, text] of Object.entries(q['选项'])) {
                            if (text) {
                                const sel = selectedOptions.has(key) ? ' selected' : '';
                                html += `<div class="option-item${sel}" onclick="toggleOption('${key}', 'single')">
                                    <div class="letter">${key}</div>${text}</div>`;
                            }
                        }
                    } else if (q['题型'] === '多选题') {
                        for (const [key, text] of Object.entries(q['选项'])) {
                            if (text) {
                                const sel = selectedOptions.has(key) ? ' selected' : '';
                                const check = sel ? '✓' : '';
                                html += `<div class="option-item${sel}" onclick="toggleOption('${key}', 'multi')">
                                    <div class="checkbox">${check}</div>${key}. ${text}</div>`;
                            }
                        }
                    }

                    // 按钮
                    html += '<div class="btn-row">';
                    html += `<button class="btn btn-nav" onclick="prevQuestion()">◀</button>`;
                    html += `<button class="btn btn-submit" onclick="submitAnswer()">提交</button>`;
                    html += `<button class="btn btn-nav" onclick="nextQuestion()">▶</button>`;
                    const isFav = favSet.has(q.id);
                    html += `<button class="btn btn-fav" onclick="toggleFav()">${isFav ? '★' : '☆'}</button>`;
                    html += '</div>';

                    // 解析区（提交后显示）
                    html += `<div class="analysis" id="analysisBox"></div>`;

                    html += '</div>';
                } else if (currentMode && currentQuestions.length === 0) {
                    html += '<div class="card" style="text-align:center;padding:40px;">没有题目</div>';
                }
            }

            // 导入小按钮
            if (bankNames.length > 0) {
                html += `<div style="text-align:center;margin-top:8px;">
                    <button class="nav-btn" onclick="document.getElementById('fileInput2').click()">📥 导入更多题库</button>
                    <input type="file" id="fileInput2" accept=".xlsx,.xls" multiple
                        onchange="importBanks(this.files);this.value=''" style="display:none">
                </div>`;
            }

            main.innerHTML = html;
        }

        function renderManage(main) {
            const bankNames = Object.keys(banks);
            let html = '';

            if (bankNames.length === 0) {
                html += `<div class="import-area" onclick="document.getElementById('fileInputM').click()">
                    <div style="font-size:36px;margin-bottom:8px;">📁</div>
                    <div>点击导入题库</div>
                    <input type="file" id="fileInputM" accept=".xlsx,.xls" multiple
                        onchange="importBanks(this.files);this.value=''" style="display:none">
                </div>`;
            } else {
                // 分类树
                html += '<div class="card"><div class="card-title">知识分类目录</div>';
                html += '<div class="cat-tree" id="catTree"></div>';

                // 题库管理
                html += '<div class="btn-row">';
                html += '<button class="nav-btn" onclick="document.getElementById(\'fileInputM2\').click()">📥 导入</button>';
                html += '<button class="nav-btn" onclick="deleteBank()">🗑 删题库</button>';
                html += '<button class="nav-btn" onclick="exportAll()">📤 导出</button>';
                html += '</div>';
                html += '<input type="file" id="fileInputM2" accept=".xlsx,.xls" multiple
                    onchange="importBanks(this.files);this.value=''" style="display:none">';

                // 题库选择
                html += '<select id="bankSelect" onchange="onBankChange()" style="width:100%;padding:10px;border-radius:12px;margin-top:8px;background:#1a1a30;color:#eee;border:1px solid #2a2a4a;">';
                for (const name of bankNames) {
                    html += `<option value="${name}">${name}</option>`;
                }
                html += '</select></div>';

                // 题目列表
                html += '<div class="card"><div class="card-title">题目列表</div>';
                html += '<div id="questionList"></div></div>';
            }

            main.innerHTML = html;
            if (bankNames.length > 0) {
                renderCatTree();
                onBankChange();
            }
        }

        function renderCatTree() {
            const treeDiv = document.getElementById('catTree');
            if (!treeDiv) return;
            const bankName = document.getElementById('bankSelect')?.value;
            if (!bankName) return;

            // 从当前题库提取分类
            const qs = banks[bankName] || [];
            const cats = [...new Set(qs.map(q => q['知识类型']).filter(Boolean))];
            const tree = {};
            for (const cat of cats) {
                const parts = cat.split('/');
                let current = tree;
                for (const part of parts) {
                    if (!current[part]) current[part] = {};
                    current = current[part];
                }
            }

            function renderTree(node, prefix = '') {
                let html = '';
                for (const [name, children] of Object.entries(node)) {
                    const path = prefix ? `${prefix}/${name}` : name;
                    const hasChildren = Object.keys(children).length > 0;
                    const selected = selectedCat === path ? ' selected' : '';
                    html += `<div class="cat-item${selected}" onclick="selectCat('${path}')">`;
                    html += `${name} (${countCatQs(path, bankName)})</div>`;
                    if (hasChildren) {
                        html += `<div class="sub-cats open">${renderTree(children, path)}</div>`;
                    }
                }
                return html;
            }

            treeDiv.innerHTML = renderTree(tree) || '<div style="color:#aaa;padding:8px;">暂无分类</div>';
        }

        function countCatQs(catPath, bankName) {
            const qs = banks[bankName] || [];
            return qs.filter(q => q['知识类型'] === catPath || (q['知识类型'] || '').startsWith(catPath + '/')).length;
        }

        function selectCat(path) {
            selectedCat = path;
            renderCatTree();
            onBankChange();
        }

        function onBankChange() {
            const bankName = document.getElementById('bankSelect')?.value;
            if (!bankName) return;
            const qs = banks[bankName] || [];
            let filteredQs = qs;
            if (selectedCat) {
                filteredQs = qs.filter(q => q['知识类型'] === selectedCat || (q['知识类型'] || '').startsWith(selectedCat + '/'));
            }
            const listDiv = document.getElementById('questionList');
            if (!listDiv) return;
            let html = '';
            for (const q of filteredQs) {
                html += `<div style="padding:8px;border-bottom:1px solid #2a2a4a;font-size:13px;">
                    <span style="color:#e94560;">[${q['题型']}]</span> ${q['题干'].substring(0, 40)}...
                    <span style="color:#aaa;float:right;">答案: ${q['答案']}</span></div>`;
            }
            listDiv.innerHTML = html || '<div style="color:#aaa;text-align:center;padding:20px;">无题目</div>';
        }

        function deleteBank() {
            const bankName = document.getElementById('bankSelect')?.value;
            if (!bankName) return;
            if (confirm(`确定删除题库「${bankName}」？此操作不可恢复。`)) {
                delete banks[bankName];
                saveAll();
                setStatus(`已删除「${bankName}」`);
                render();
            }
        }

        function exportAll() {
            const allQs = [];
            for (const [name, qs] of Object.entries(banks)) {
                for (const q of qs) {
                    allQs.push({
                        题库: name,
                        知识类型: q['知识类型'],
                        题型: q['题型'],
                        题干: q['题干'],
                        ...q['选项'],
                        答案: q['答案'],
                        解析: q['解析']
                    });
                }
            }
            const ws = XLSX.utils.json_to_sheet(allQs);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '题库');
            XLSX.writeFile(wb, '全部题库导出.xlsx');
            setStatus('导出成功');
        }

        // ==================== 刷题逻辑 ====================
        function toggleBank(name) {
            const idx = selectedBanks.indexOf(name);
            if (idx >= 0) selectedBanks.splice(idx, 1);
            else selectedBanks.push(name);
            render();
        }

        function startMode(mode) {
            if (selectedBanks.length === 0 && mode !== 'wrong' && mode !== 'fav') {
                setStatus('请先选择题库');
                return;
            }
            currentMode = mode;
            selectedOptions.clear();
            currentIndex = 0;
            examAnswers = {};

            if (mode === 'sequence') {
                currentQuestions = selectedBanks.flatMap(bn => banks[bn] || []);
                const key = selectedBanks.sort().join('|');
                currentIndex = Math.min(progress[key]?.sequence || 0, currentQuestions.length - 1);
            } else if (mode === 'random') {
                currentQuestions = selectedBanks.flatMap(bn => banks[bn] || []);
                const key = selectedBanks.sort().join('|');
                if (!progress[key]?.randomPool) {
                    const ids = currentQuestions.map(q => q.id);
                    for (let i = ids.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [ids[i], ids[j]] = [ids[j], ids[i]];
                    }
                    progress[key] = { randomPool: ids, randomIndex: 0 };
                }
                const pool = progress[key].randomPool;
                currentQuestions = pool.map(id => currentQuestions.find(q => q.id === id)).filter(Boolean);
                currentIndex = progress[key].randomIndex || 0;
            } else if (mode === 'wrong') {
                const wIds = [...wrongSet];
                currentQuestions = Object.values(banks).flat().filter(q => wIds.includes(q.id));
            } else if (mode === 'fav') {
                const fIds = [...favSet];
                currentQuestions = Object.values(banks).flat().filter(q => fIds.includes(q.id));
            }

            document.getElementById('analysisBox')?.classList.remove('show', 'correct', 'wrong');
            render();
            setStatus(`加载 ${currentQuestions.length} 道题目`);
        }

        function toggleOption(val, type) {
            if (type === 'single') {
                selectedOptions.clear();
                selectedOptions.add(val);
            } else {
                if (selectedOptions.has(val)) selectedOptions.delete(val);
                else selectedOptions.add(val);
            }
            render();
        }

        function submitAnswer() {
            if (!currentQuestions.length || currentIndex >= currentQuestions.length) return;
            const q = currentQuestions[currentIndex];
            let userAns;
            if (q['题型'] === '多选题') {
                userAns = [...selectedOptions].sort().join('');
            } else {
                userAns = [...selectedOptions][0] || '';
            }
            if (!userAns) {
                setStatus('请选择答案');
                return;
            }
            const isCorrect = userAns.toUpperCase() === q['答案'].toUpperCase();
            const box = document.getElementById('analysisBox');
            if (box) {
                box.classList.add('show');
                if (isCorrect) {
                    box.classList.add('correct');
                    box.classList.remove('wrong');
                    box.innerHTML = '✓ 正确！';
                    setStatus('回答正确 ✓');
                } else {
                    box.classList.add('wrong');
                    box.classList.remove('correct');
                    box.innerHTML = `✗ 错误！正确答案：${q['答案']}<br>${q['解析'] || ''}`;
                    wrongSet.add(q.id);
                    setStatus('回答错误 ✗');
                }
            }
            saveAll();
            render();
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                selectedOptions.clear();
                if (currentMode === 'sequence') {
                    const key = selectedBanks.sort().join('|');
                    progress[key] = { ...progress[key], sequence: currentIndex };
                }
                document.getElementById('analysisBox')?.classList.remove('show', 'correct', 'wrong');
                render();
            } else {
                setStatus('已经是最后一题');
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                selectedOptions.clear();
                document.getElementById('analysisBox')?.classList.remove('show', 'correct', 'wrong');
                render();
            }
        }

        function toggleFav() {
            const q = currentQuestions[currentIndex];
            if (q) {
                if (favSet.has(q.id)) favSet.delete(q.id);
                else favSet.add(q.id);
                saveAll();
                render();
            }
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>

    <!-- 使用 CDN 加载 xlsx 库 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
